<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공기정비기능사 Pro</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const MathText = ({ text }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                // 라이브러리가 로드될 때까지 최대 2초간 대기하는 루프
                const checkAndRender = (retryCount = 0) => {
                    if (window.renderMathInElement) {
                        try {
                            window.renderMathInElement(containerRef.current, {
                                delimiters: [
                                    { left: "$$", right: "$$", display: true },
                                    { left: "$", right: "$", display: false }
                                ],
                                throwOnError: false
                            });
                        } catch (e) { console.error(e); }
                    } else if (retryCount < 20) {
                        setTimeout(() => checkAndRender(retryCount + 1), 100);
                    }
                };
                
                checkAndRender();
            }, [text]);
            
            return <div ref={containerRef} className="whitespace-pre-wrap">{text || ""}</div>;
        };

        const App = () => {
            return (
                <div className="p-10 text-center">
                    <h1 className="text-2xl font-black mb-4">정상 작동 확인</h1>
                    <MathText text="수학 공식 테스트: $E=mc^2$" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
