<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공마스터 Pro - 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX for Math Symbols -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-drawer {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; padding-top: 80px;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-item {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; margin: 0 auto 10px auto;
            border: 2px solid #f1f5f9; cursor: pointer;
        }
        .nav-item.active { background: #4f46e5; color: white; border-color: transparent; }
        .nav-item.correct { background: #10b981; color: white; border-color: transparent; }
        .nav-item.wrong { background: #ef4444; color: white; border-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase Configuration ---
        const firebaseConfig = {
            apiKey: "AIzaSyCoSlnAX9Hqh85IBtJuGqLrJdpxRbFgwnc",
            authDomain: "airtest-422fe.firebaseapp.com",
            projectId: "airtest-422fe",
            storageBucket: "airtest-422fe.firebasestorage.app",
            messagingSenderId: "203408450908",
            appId: "1:203408450908:web:1be58ef1b4b4f4b3f5cd99",
            measurementId: "G-PC36TY5R3M"
        };
        const appId = "airtest-admin"; 
        
        let db, auth;
        try {
            if (typeof firebase !== 'undefined') {
                const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
                
                // [FIX] Force Long Polling for better compatibility in restricted networks (Vercel/School WiFi)
                db = firebase.firestore();
                db.settings({ experimentalForceLongPolling: true });
                
                auth = firebase.auth();
            }
        } catch (e) { 
            console.error("Firebase Initialization Error:", e); 
        }

        const MathText = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(containerRef.current, {
                        delimiters: [
                            { left: "$$", right: "$$", display: true },
                            { left: "$", right: "$", display: false },
                            { left: "\\(", right: "\\)", display: false },
                            { left: "\\[", right: "\\]", display: true }
                        ],
                        throwOnError: false
                    });
                }
            }, [text]);
            return <div ref={containerRef} className="whitespace-pre-wrap leading-relaxed">{text || ""}</div>;
        };

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [connError, setConnError] = useState(false);
            
            const [questions, setQuestions] = useState([]);
            const [students, setStudents] = useState([]);
            const [results, setResults] = useState([]);
            const [examStatus, setExamStatus] = useState({ active: false, title: "정기 시험" });
            const [studentProfile, setStudentProfile] = useState(null);

            const [filters, setFilters] = useState({ year: '전체', session: '전체', category: '전체', limit: '10', mode: 'PRACTICE' });
            const [quizList, setQuizList] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isReview, setIsReview] = useState(false);
            const [isNavOpen, setIsNavOpen] = useState(false);

            // Authentication & Offline Handling
            useEffect(() => {
                if (!auth) {
                    setLoading(false);
                    setConnError(true);
                    return;
                }
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                    } else {
                        try {
                            await auth.signInAnonymously();
                        } catch (err) {
                            console.error("Anonymous Auth Failed", err);
                        }
                    }
                    setLoading(false);
                });

                // Error timeout to prevent infinite loading
                const timer = setTimeout(() => {
                    if(loading) {
                        setLoading(false);
                        setConnError(true);
                    }
                }, 10000);

                return () => { unsubscribe(); clearTimeout(timer); };
            }, []);

            // Data Fetching with Connection Error Catch
            useEffect(() => {
                if (!user || !db) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const handleErr = (e) => {
                    console.error("Firestore Sync Error:", e);
                    setConnError(true);
                };

                const unsubQuestions = path.collection('questions').onSnapshot(s => setQuestions(s.docs.map(d => ({id: d.id, ...d.data()}))), handleErr);
                const unsubResults = path.collection('results').onSnapshot(s => setResults(s.docs.map(d => ({id: d.id, ...d.data()}))), handleErr);
                const unsubStudents = path.collection('students').onSnapshot(s => setStudents(s.docs.map(d => ({id: d.id, ...d.data()}))), handleErr);
                const unsubConfig = path.collection('configs').doc('main').onSnapshot(doc => {
                    if(doc.exists) setExamStatus(doc.data().exam || { active: false, title: "정기 시험" });
                }, handleErr);

                return () => { unsubQuestions(); unsubResults(); unsubStudents(); unsubConfig(); };
            }, [user]);

            const handleLogin = (name, sid) => {
                if (!name || !sid) return alert("정보를 입력해주세요.");
                
                // If offline but we have students data cached/loaded
                if (students.length > 0) {
                    const found = students.find(s => s.name === name && String(s.studentId) === String(sid));
                    if (!found) return alert("등록되지 않은 학생 정보입니다.");
                }
                
                setStudentProfile({ name, studentId: sid });
                setView('HOME');
            };

            const startQuiz = () => {
                if (filters.mode === 'EXAM' && !examStatus.active) return alert("현재 시험 모드가 비활성화되어 있습니다.");
                let pool = questions.filter(q => 
                    (filters.year === '전체' || String(q.year) === filters.year) &&
                    (filters.session === '전체' || q.session === filters.session) &&
                    (filters.category === '전체' || q.category === filters.category)
                );
                if (pool.length === 0) return alert("조건에 맞는 문제가 없습니다. (데이터 로딩 중일 수 있습니다)");
                
                pool = [...pool].sort(() => Math.random() - 0.5);
                if (filters.limit !== '전체') pool = pool.slice(0, parseInt(filters.limit));
                
                setQuizList(pool);
                setAnswers({});
                setCurrentIdx(0);
                setIsReview(false);
                setIsNavOpen(false);
                setView('QUIZ');
            };

            const submitQuiz = async () => {
                if (isSubmitting) return;
                setIsSubmitting(true);
                
                const correctCount = quizList.reduce((acc, q, idx) => acc + (answers[idx] === q.correct ? 1 : 0), 0);
                const score = Math.round((correctCount / quizList.length) * 100);
                
                try {
                    if (db && user && studentProfile) {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').add({
                            name: studentProfile.name,
                            studentId: studentProfile.studentId,
                            score,
                            correct: correctCount,
                            total: quizList.length,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            mode: filters.mode,
                            uid: user.uid
                        });
                    }
                } catch (e) {
                    console.error("Save Error:", e);
                } finally {
                    setIsSubmitting(false);
                    setView('RESULT');
                }
            };

            const reportData = useMemo(() => {
                if (view !== 'RESULT' || quizList.length === 0) return null;
                const correctCount = quizList.reduce((acc, q, idx) => acc + (answers[idx] === q.correct ? 1 : 0), 0);
                const score = Math.round((correctCount / quizList.length) * 100);
                return { score, correctCount, total: quizList.length };
            }, [view, quizList, answers]);

            const handleFileUpload = (e, type) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (event) => {
                    try {
                        const content = event.target.result;
                        let data = [];
                        if (type === 'students') {
                            const lines = content.split(/\r?\n/).filter(l => l.trim() !== '');
                            data = lines.map(line => {
                                const parts = line.split(',').map(item => item.trim());
                                if (parts.length < 2) return null;
                                return { name: parts[0], studentId: parts[1] };
                            }).filter(i => i !== null);
                            if (data.length > 0 && (data[0].name === '이름' || data[0].name === 'name')) data.shift();
                        } else {
                            data = JSON.parse(content);
                        }

                        if (!Array.isArray(data) || data.length === 0) throw new Error("No data");
                        
                        const batch = db.batch();
                        const collRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(type);
                        data.forEach(item => batch.set(collRef.doc(), item));
                        await batch.commit();
                        alert(`${data.length}건 완료`);
                    } catch (e) { alert("오류 발생"); }
                };
                reader.readAsText(file);
            };

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-indigo-400">
                    <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div className="font-bold tracking-widest text-[10px] uppercase">Connecting to Database...</div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 relative shadow-2xl overflow-hidden border-x border-slate-200">
                    
                    {connError && (
                        <div className="bg-rose-500 text-white text-[10px] py-1 px-4 text-center font-bold">
                            서버 연결이 원활하지 않습니다. 오프라인 모드로 동작합니다.
                        </div>
                    )}

                    {/* Navigation Drawer */}
                    <div className={`nav-drawer ${isNavOpen ? 'open' : ''} overflow-y-auto custom-scroll`}>
                        {quizList.map((_, i) => (
                            <div key={i} onClick={() => { setCurrentIdx(i); setIsNavOpen(false); }} 
                                className={`nav-item ${currentIdx === i ? 'active' : ''} ${isReview || (filters.mode === 'PRACTICE' && answers[i] !== undefined) ? (answers[i] === quizList[i].correct ? 'correct' : 'wrong') : (answers[i] !== undefined ? 'bg-indigo-100 text-indigo-600' : '')}`}>
                                {i + 1}
                            </div>
                        ))}
                    </div>

                    <header className="p-4 glass sticky top-0 z-50 flex justify-between items-center">
                        <div className="cursor-pointer" onClick={() => !isSubmitting && setView('HOME')}>
                            <span className="text-xl font-black text-indigo-600 italic tracking-tighter">AERO MASTER</span>
                        </div>
                        <div className="flex gap-2">
                            {view === 'QUIZ' && <button onClick={() => setIsNavOpen(!isNavOpen)} className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg font-black text-[10px]">INDEX</button>}
                            <button onClick={() => {
                                const pw = prompt("관리자 암호");
                                if(pw === '1111') setView('ADMIN');
                            }} className="p-2 bg-slate-100 rounded-lg text-slate-400">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto custom-scroll">
                        {view === 'LOGIN' && (
                            <div className="h-full flex flex-col items-center justify-center py-10">
                                <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-xl rotate-3 text-white">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2 tracking-tighter uppercase">Student Login</h2>
                                <div className="w-full space-y-3 mb-8">
                                    <input id="l-name" type="text" placeholder="성함" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold outline-none focus:ring-2 ring-indigo-100 transition-all" />
                                    <input id="l-id" type="text" placeholder="학번" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold outline-none focus:ring-2 ring-indigo-100 transition-all" />
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('l-name').value, document.getElementById('l-id').value)} className="w-full py-4 bg-slate-900 text-white rounded-xl font-black shadow-xl active:scale-95 transition-all">접속하기</button>
                            </div>
                        )}

                        {view === 'HOME' && (
                            <div className="space-y-6">
                                <div className="p-6 bg-white rounded-2xl border border-slate-100 shadow-sm">
                                    <h3 className="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">Exam Settings</h3>
                                    <div className="space-y-5">
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={() => setFilters({...filters, mode: 'PRACTICE'})} className={`py-3 rounded-xl font-black text-xs border-2 transition-all ${filters.mode === 'PRACTICE' ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-slate-50 text-slate-400'}`}>자율 학습</button>
                                            <button onClick={() => setFilters({...filters, mode: 'EXAM'})} className={`py-3 rounded-xl font-black text-xs border-2 transition-all ${filters.mode === 'EXAM' ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-50 text-slate-400'}`}>실전 시험</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <select value={filters.year} onChange={e => setFilters({...filters, year: e.target.value})} className="p-3 bg-slate-50 rounded-xl font-bold text-xs outline-none">
                                                <option value="전체">전체 연도</option>
                                                {[...new Set(questions.map(q => String(q.year)))].sort().reverse().map(y => <option key={y} value={y}>{y}년</option>)}
                                            </select>
                                            <select value={filters.session} onChange={e => setFilters({...filters, session: e.target.value})} className="p-3 bg-slate-50 rounded-xl font-bold text-xs outline-none">
                                                <option value="전체">전체 회차</option>
                                                {[...new Set(questions.map(q => q.session))].sort().map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </div>
                                        <select value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs outline-none">
                                            <option value="전체">전체 과목</option>
                                            {[...new Set(questions.map(q => q.category))].sort().map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        <button onClick={startQuiz} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-black text-sm shadow-lg active:scale-95 transition-all">학습 시작</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'QUIZ' && quizList[currentIdx] && (
                            <div className="pb-24">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="px-3 py-1 bg-indigo-600 text-white rounded-lg text-[9px] font-black">{quizList[currentIdx].category}</span>
                                    <span className="text-lg font-black text-slate-800">{currentIdx + 1}<span className="text-slate-300 text-xs ml-1">/ {quizList.length}</span></span>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mb-6 font-bold text-slate-800 text-lg leading-relaxed">
                                    <MathText text={quizList[currentIdx].q} />
                                </div>
                                <div className="space-y-3">
                                    {quizList[currentIdx].options.map((opt, i) => {
                                        const selected = answers[currentIdx] === i;
                                        const correct = quizList[currentIdx].correct === i;
                                        const showResult = isReview || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined);
                                        
                                        let btnStyle = "border-slate-100 bg-white hover:border-indigo-200";
                                        if (selected) btnStyle = "border-indigo-600 bg-indigo-50 text-indigo-700 ring-2 ring-indigo-100";
                                        if (showResult) {
                                            if (correct) btnStyle = "border-emerald-500 bg-emerald-50 text-emerald-700 ring-2 ring-emerald-100";
                                            else if (selected) btnStyle = "border-rose-500 bg-rose-50 text-rose-700 ring-2 ring-rose-100";
                                        }
                                        
                                        return (
                                            <button key={i} disabled={showResult} onClick={() => setAnswers({...answers, [currentIdx]: i})} className={`w-full p-4 text-left border-2 rounded-xl flex gap-3 transition-all ${btnStyle}`}>
                                                <span className={`w-6 h-6 rounded flex items-center justify-center shrink-0 text-[10px] font-black ${selected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>
                                                <div className="text-[13px] font-semibold"><MathText text={opt} /></div>
                                            </button>
                                        );
                                    })}
                                </div>
                                {(isReview || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined)) && (
                                    <div className="mt-8 p-5 bg-slate-900 rounded-2xl text-white text-[11px] border-l-4 border-indigo-400">
                                        <div className="font-black text-indigo-400 mb-2 tracking-widest uppercase">Expert Explanation</div>
                                        <MathText text={quizList[currentIdx].exp || "해설이 제공되지 않는 문항입니다."} />
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'RESULT' && reportData && (
                            <div className="space-y-6 pb-10">
                                <div className="text-center py-12 bg-white rounded-[2rem] shadow-xl border border-slate-100">
                                    <p className="text-[9px] font-black text-slate-300 uppercase mb-1">Final Score</p>
                                    <h2 className="text-6xl font-black text-slate-900 mb-4 tracking-tighter">{reportData.score}<span className="text-xl text-slate-200 ml-1 font-normal">pts</span></h2>
                                    <p className="text-xs font-bold text-slate-400">{reportData.total}문항 중 {reportData.correctCount}문항 해결</p>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => { setIsReview(true); setView('QUIZ'); setCurrentIdx(0); }} className="py-4 bg-slate-900 text-white rounded-xl font-black text-xs shadow-lg">오답 리뷰</button>
                                    <button onClick={() => setView('HOME')} className="py-4 bg-white border border-slate-200 text-slate-500 rounded-xl font-black text-xs">홈으로</button>
                                </div>
                            </div>
                        )}

                        {view === 'ADMIN' && (
                            <div className="space-y-6 pb-20">
                                <h3 className="font-black text-slate-800 text-xl tracking-tighter uppercase">Admin Console</h3>
                                <div className="p-5 bg-white rounded-2xl border border-slate-100 shadow-sm space-y-6">
                                    <div>
                                        <h4 className="text-[10px] font-black text-slate-400 uppercase mb-3">Student Roster (CSV)</h4>
                                        <input type="file" accept=".csv" onChange={(e) => handleFileUpload(e, 'students')} className="w-full text-[10px] file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-indigo-50 file:text-indigo-700"/>
                                    </div>
                                    <div className="border-t pt-5">
                                        <h4 className="text-[10px] font-black text-slate-400 uppercase mb-3">Question Database (JSON)</h4>
                                        <input type="file" accept=".json" onChange={(e) => handleFileUpload(e, 'questions')} className="w-full text-[10px] file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-[10px] file:font-black file:bg-slate-100 file:text-slate-700"/>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Quiz Controls */}
                    {view === 'QUIZ' && (
                        <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 glass flex gap-3 z-40">
                            <button disabled={currentIdx === 0} onClick={() => setCurrentIdx(p => p - 1)} className="w-12 h-12 bg-slate-100 text-slate-500 rounded-xl flex items-center justify-center disabled:opacity-20">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <button 
                                disabled={isSubmitting}
                                onClick={() => { 
                                    if (currentIdx < quizList.length - 1) { 
                                        setCurrentIdx(p => p + 1); 
                                    } else if(!isReview) { 
                                        if (confirm("정답을 모두 제출하시겠습니까?")) submitQuiz(); 
                                    } else { 
                                        setView('RESULT'); 
                                    } 
                                }} 
                                className={`flex-1 py-3 text-white rounded-xl font-black text-xs shadow-lg transition-all ${isSubmitting ? 'bg-slate-400' : 'bg-indigo-600'}`}
                            >
                                {isSubmitting ? '저장 중...' : (currentIdx === quizList.length - 1 ? (isReview ? '리뷰 종료' : '최종 제출') : '다음 문제')}
                            </button>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
