<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공마스터 Pro - 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .nav-drawer {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; padding-top: 80px;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-item {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; margin: 0 auto 10px auto;
            border: 2px solid #f1f5f9; cursor: pointer;
        }
        .nav-item.active { border-color: #4f46e5; background: #4f46e5; color: white; }
        .nav-item.correct { background: #10b981; color: white; border-color: transparent; }
        .nav-item.wrong { background: #ef4444; color: white; border-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const configRaw = window.__firebase_config || '{}';
        const firebaseConfig = JSON.parse(configRaw);
        const appId = window.__app_id || 'aviation-master-pro';

        let db = null;
        let auth = null;

        try {
            if (firebaseConfig.apiKey) {
                const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
                db = firebase.firestore();
                auth = firebase.auth();
            }
        } catch (e) { console.error("Firebase Error:", e); }

        const MathText = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    renderMathInElement(containerRef.current, {
                        delimiters: [
                            { left: "$$", right: "$$", display: true },
                            { left: "$", right: "$", display: false },
                            { left: "\\(", right: "\\)", display: false },
                            { left: "\\[", right: "\\]", display: true }
                        ],
                        throwOnError: false
                    });
                }
            }, [text]);
            return <div ref={containerRef} className="whitespace-pre-wrap leading-relaxed">{text || ""}</div>;
        };

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [studentProfile, setStudentProfile] = useState(null);
            
            const [questions, setQuestions] = useState([]);
            const [students, setStudents] = useState([]);
            const [results, setResults] = useState([]);
            const [examConfig, setExamConfig] = useState({ active: false });
            
            const [quizList, setQuizList] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isReviewMode, setIsReviewMode] = useState(false);
            const [isNavOpen, setIsNavOpen] = useState(false);
            
            const [filters, setFilters] = useState({ 
                year: '전체', session: '전체', category: '전체', limit: '10', mode: 'PRACTICE' 
            });

            // Data Fetching
            useEffect(() => {
                if (!auth) { setLoading(false); return; }
                const unsubAuth = auth.onAuthStateChanged(u => {
                    setUser(u);
                    setLoading(false);
                });

                if (db) {
                    const publicRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                    
                    const unsubQ = publicRef.collection('questions').onSnapshot(s => setQuestions(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const unsubS = publicRef.collection('students').onSnapshot(s => setStudents(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const unsubR = publicRef.collection('results').onSnapshot(s => setResults(s.docs.map(d => ({id: d.id, ...d.data()}))));
                    const unsubC = publicRef.collection('configs').doc('main').onSnapshot(doc => {
                        if(doc.exists) setExamConfig(doc.data().exam || { active: false });
                    });

                    return () => { unsubQ(); unsubS(); unsubR(); unsubC(); unsubAuth(); };
                }
            }, []);

            const handleLogin = (name, sid) => {
                if (!name || !sid) return alert("정보를 입력하세요.");
                if (students.length > 0) {
                    const found = students.find(s => s.name === name && String(s.studentId) === String(sid));
                    if (!found) return alert("등록되지 않은 학생 정보입니다.");
                }
                setStudentProfile({ name, studentId: sid });
                setView('HOME');
            };

            const startQuiz = () => {
                if (filters.mode === 'EXAM' && !examConfig.active) {
                    return alert("현재 관리자에 의해 시험 모드가 비활성화되어 있습니다.");
                }

                let pool = questions.filter(q => 
                    (filters.year === '전체' || String(q.year) === filters.year) &&
                    (filters.session === '전체' || q.session === filters.session) &&
                    (filters.category === '전체' || q.category === filters.category)
                );

                if (pool.length === 0) return alert("해당 조건의 문제가 없습니다.");

                pool = [...pool].sort(() => Math.random() - 0.5);
                if (filters.limit !== '전체') pool = pool.slice(0, parseInt(filters.limit));

                setQuizList(pool);
                setAnswers({});
                setCurrentIdx(0);
                setIsReviewMode(false);
                setView('QUIZ');
            };

            const submitQuiz = async () => {
                const correctCount = quizList.filter((q, idx) => answers[idx] === q.correct).length;
                const finalScore = Math.round((correctCount / quizList.length) * 100);
                
                if (db && studentProfile) {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').add({
                        name: studentProfile.name,
                        studentId: studentProfile.studentId,
                        score: finalScore,
                        correct: correctCount,
                        total: quizList.length,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        mode: filters.mode
                    });
                }
                setView('RESULT');
            };

            // Admin: File Uploads
            const uploadQuestions = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        const batch = db.batch();
                        const qRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('questions');
                        data.forEach((q, i) => batch.set(qRef.doc(q.id || `q_${Date.now()}_${i}`), q));
                        await batch.commit();
                        alert("문제 업로드 완료");
                    } catch (err) { alert("JSON 형식 오류"); }
                };
                reader.readAsText(file);
            };

            const uploadStudents = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    const lines = evt.target.result.split('\n').filter(l => l.trim());
                    const batch = db.batch();
                    const sRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
                    lines.forEach(line => {
                        const [name, sid] = line.split(',').map(s => s.trim());
                        if(name && sid) batch.set(sRef.doc(sid), { name, studentId: sid });
                    });
                    await batch.commit();
                    alert("학생 명단 업로드 완료");
                };
                reader.readAsText(file);
            };

            const toggleExam = async () => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('configs').doc('main').set({
                    exam: { active: !examConfig.active }
                }, { merge: true });
            };

            const exportResults = () => {
                if (results.length === 0) return;
                const header = "성함,학번,점수,모드,일시\n";
                const rows = results.map(r => `${r.name},${r.studentId},${r.score},${r.mode},${r.timestamp?.toDate().toLocaleString()}`).join("\n");
                const blob = new Blob(["\uFEFF" + header + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `results_${Date.now()}.csv`;
                link.click();
            };

            if (loading) return <div className="h-screen flex items-center justify-center text-slate-400 font-bold animate-pulse">SYSTEM LOADING...</div>;

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 shadow-2xl relative overflow-x-hidden">
                    
                    {/* Drawer */}
                    <div className={`nav-drawer ${isNavOpen ? 'open' : ''} overflow-y-auto custom-scroll`}>
                        {quizList.map((_, i) => (
                            <div key={i} onClick={() => { setCurrentIdx(i); setIsNavOpen(false); }} 
                                className={`nav-item ${currentIdx === i ? 'active' : ''} ${isReviewMode ? (answers[i] === quizList[i].correct ? 'correct' : 'wrong') : (answers[i] !== undefined ? 'answered' : '')}`}>
                                {i + 1}
                            </div>
                        ))}
                    </div>

                    <header className="p-4 glass sticky top-0 z-50 flex justify-between items-center">
                        <div className="cursor-pointer" onClick={() => setView('HOME')}>
                            <span className="text-xl font-black text-indigo-600 italic">AERO MASTER</span>
                        </div>
                        <div className="flex gap-2">
                            {view === 'QUIZ' && <button onClick={() => setIsNavOpen(!isNavOpen)} className="px-3 py-1 bg-slate-100 rounded-lg text-[10px] font-black">문항</button>}
                            <button onClick={() => setView('ADMIN')} className="p-2 text-slate-400 hover:text-indigo-600">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto">
                        {view === 'LOGIN' && (
                            <div className="flex flex-col items-center justify-center py-10 animate-in fade-in">
                                <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-8 shadow-lg text-white">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 mb-8">학생 인증</h2>
                                <div className="w-full space-y-3 mb-8">
                                    <input id="l-name" type="text" placeholder="성함" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold outline-none" />
                                    <input id="l-id" type="text" placeholder="학번" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold outline-none" />
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('l-name').value, document.getElementById('l-id').value)} className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold shadow-xl">시스템 접속</button>
                            </div>
                        )}

                        {view === 'HOME' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4">
                                <div className="p-6 bg-white rounded-2xl border border-slate-100 shadow-sm space-y-6">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">학습 및 시험 설정</h3>
                                    
                                    <div className="grid grid-cols-2 gap-2">
                                        <button onClick={() => setFilters({...filters, mode: 'PRACTICE'})} className={`py-3 rounded-xl font-black text-xs border-2 transition-all ${filters.mode === 'PRACTICE' ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-slate-50 text-slate-400'}`}>연습 모드</button>
                                        <button onClick={() => setFilters({...filters, mode: 'EXAM'})} className={`py-3 rounded-xl font-black text-xs border-2 transition-all ${filters.mode === 'EXAM' ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-50 text-slate-400'}`}>시험 모드</button>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="space-y-1">
                                                <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase tracking-tighter">연도</span>
                                                <select value={filters.year} onChange={e => setFilters({...filters, year: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs border-none">
                                                    <option value="전체">전체</option>
                                                    {[...new Set(questions.map(q => String(q.year)))].sort().reverse().map(y => <option key={y} value={y}>{y}년</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase tracking-tighter">회차 (New)</span>
                                                <select value={filters.session} onChange={e => setFilters({...filters, session: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs border-none">
                                                    <option value="전체">전체</option>
                                                    {[...new Set(questions.map(q => q.session))].sort().map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase tracking-tighter">과목 선택</span>
                                            <select value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs border-none">
                                                <option value="전체">전체 과목</option>
                                                {[...new Set(questions.map(q => q.category))].sort().map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-3">
                                            <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase tracking-tighter">문항 수 선택</span>
                                            <div className="grid grid-cols-3 gap-2">
                                                {['5', '10', '20', '30', '60', '전체'].map(num => (
                                                    <button key={num} onClick={() => setFilters({...filters, limit: num})} className={`py-2.5 rounded-xl text-xs font-bold border ${filters.limit === num ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-slate-50 border-transparent text-slate-500'}`}>{num === '전체' ? num : `${num}문항`}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={startQuiz} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-sm shadow-lg">시작하기</button>
                                </div>
                            </div>
                        )}

                        {view === 'QUIZ' && quizList[currentIdx] && (
                            <div className="pb-24 animate-in fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex gap-2">
                                        <span className="px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[9px] font-black uppercase">{quizList[currentIdx].year}년 {quizList[currentIdx].session}</span>
                                        <span className="px-2.5 py-1 bg-slate-900 text-white rounded-lg text-[9px] font-black uppercase">{quizList[currentIdx].category}</span>
                                    </div>
                                    <span className="text-lg font-black text-slate-800">{currentIdx + 1}<span className="text-slate-300 text-xs ml-1">/ {quizList.length}</span></span>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mb-8 font-bold text-slate-800 text-lg leading-relaxed">
                                    <MathText text={quizList[currentIdx].q} />
                                </div>
                                <div className="space-y-3">
                                    {quizList[currentIdx].options.map((opt, i) => {
                                        const isSelected = answers[currentIdx] === i;
                                        const isCorrect = quizList[currentIdx].correct === i;
                                        const showResult = isReviewMode || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined);
                                        let btnClass = "border-white bg-white hover:border-slate-100";
                                        if (isSelected) btnClass = "border-indigo-600 bg-indigo-50 ring-4 ring-indigo-50";
                                        if (showResult) {
                                            if (isCorrect) btnClass = "border-emerald-500 bg-emerald-50 text-emerald-700 ring-4 ring-emerald-50";
                                            else if (isSelected) btnClass = "border-rose-500 bg-rose-50 text-rose-700 ring-4 ring-rose-50";
                                        }
                                        return (
                                            <button key={i} disabled={showResult} onClick={() => setAnswers({...answers, [currentIdx]: i})} className={`w-full p-4 text-left border-2 rounded-2xl flex gap-4 transition-all ${btnClass}`}>
                                                <span className={`w-6 h-6 rounded-lg flex items-center justify-center shrink-0 text-[10px] font-black ${isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>
                                                <div className="text-[14px] font-medium flex-1"><MathText text={opt} /></div>
                                            </button>
                                        );
                                    })}
                                </div>
                                {(isReviewMode || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined)) && (
                                    <div className="mt-8 p-6 bg-slate-900 rounded-2xl text-white text-[12px] border-l-4 border-indigo-500">
                                        <div className="text-indigo-400 font-black text-[10px] mb-2 uppercase tracking-widest tracking-widest">Correct Answer & Explanation</div>
                                        <MathText text={quizList[currentIdx].exp || "해설이 없습니다."} />
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'RESULT' && (
                            <div className="flex flex-col items-center justify-center py-10 animate-in zoom-in-95">
                                <div className="text-center mb-8">
                                    <span className="text-[11px] font-black text-slate-400 uppercase">학습 결과</span>
                                    <h2 className="text-7xl font-black text-slate-900 mt-2">{Math.round((quizList.filter((q, i) => answers[i] === q.correct).length / quizList.length) * 100)}<span className="text-2xl text-slate-300 font-normal">점</span></h2>
                                </div>
                                <div className="w-full bg-white rounded-3xl p-6 border border-slate-100 shadow-xl space-y-4">
                                    <div className="grid grid-cols-2 gap-3 pt-4">
                                        <button onClick={() => { setIsReviewMode(true); setCurrentIdx(0); setView('QUIZ'); }} className="py-4 bg-slate-100 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-200">복습하기 (Review)</button>
                                        <button onClick={() => setView('HOME')} className="py-4 bg-indigo-600 text-white rounded-xl font-bold text-xs shadow-lg">홈으로</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'ADMIN' && (
                            <div className="space-y-6 animate-in fade-in pb-20">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-black text-slate-800 text-xl tracking-tighter">관리자 대시보드</h3>
                                    <button onClick={toggleExam} className={`px-4 py-2 rounded-xl text-[10px] font-black ${examConfig.active ? 'bg-rose-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                                        {examConfig.active ? '시험 종료' : '시험 시작 통제'}
                                    </button>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center">
                                        <span className="text-[10px] font-black text-slate-400 uppercase mb-3">문제 (JSON)</span>
                                        <input type="file" id="up-q" className="hidden" accept=".json" onChange={uploadQuestions} />
                                        <label htmlFor="up-q" className="w-full py-3 bg-indigo-50 text-indigo-600 rounded-xl text-center text-[10px] font-bold cursor-pointer">파일 선택</label>
                                    </div>
                                    <div className="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center">
                                        <span className="text-[10px] font-black text-slate-400 uppercase mb-3">학생 (CSV)</span>
                                        <input type="file" id="up-s" className="hidden" accept=".csv" onChange={uploadStudents} />
                                        <label htmlFor="up-s" className="w-full py-3 bg-emerald-50 text-emerald-600 rounded-xl text-center text-[10px] font-bold cursor-pointer">파일 선택</label>
                                    </div>
                                </div>

                                <div className="p-5 bg-white rounded-2xl border border-slate-100 shadow-sm">
                                    <div className="flex justify-between items-center mb-4">
                                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">성적 및 응시 기록 ({results.length})</h4>
                                        <button onClick={exportResults} className="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-[9px] font-black">CSV 추출</button>
                                    </div>
                                    <div className="max-h-60 overflow-y-auto custom-scroll space-y-2">
                                        {results.sort((a,b) => b.timestamp - a.timestamp).map((r, i) => (
                                            <div key={i} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <div className="flex flex-col">
                                                    <span className="text-[11px] font-bold">{r.name} ({r.studentId})</span>
                                                    <span className="text-[8px] text-slate-400">{r.timestamp?.toDate().toLocaleString()} | {r.mode}</span>
                                                </div>
                                                <div className={`font-black text-sm ${r.score >= 60 ? 'text-emerald-500' : 'text-rose-500'}`}>{r.score}점</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {view === 'QUIZ' && (
                        <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 glass flex gap-3 z-50">
                            <button disabled={currentIdx === 0} onClick={() => setCurrentIdx(p => p - 1)} className="w-14 h-14 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center disabled:opacity-20 transition-all">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <button 
                                onClick={() => {
                                    if (currentIdx < quizList.length - 1) setCurrentIdx(p => p + 1);
                                    else if (!isReviewMode) { if(confirm("제출하시겠습니까?")) submitQuiz(); }
                                    else setView('RESULT');
                                }} 
                                className="flex-1 bg-slate-900 text-white rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-all"
                            >
                                {currentIdx === quizList.length - 1 ? (isReviewMode ? '복습 완료' : '제출 및 결과확인') : '다음 문제'}
                            </button>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
