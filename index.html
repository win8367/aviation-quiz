<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공마스터 Pro - 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX for Math -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .nav-drawer {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; padding-top: 80px;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-item {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; margin: 0 auto 10px auto;
            border: 2px solid #f1f5f9; cursor: pointer;
        }
        .nav-item.active { border-color: #4f46e5; background: #4f46e5; color: white; }
        .nav-item.answered { border-color: #4f46e5; color: #4f46e5; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- 초기 설정 ---
        const configRaw = window.__firebase_config || '{}';
        const firebaseConfig = JSON.parse(configRaw);
        const appId = window.__app_id || 'aviation-master-pro';

        let db = null;
        let auth = null;

        try {
            if (firebaseConfig.apiKey) {
                const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
                db = firebase.firestore();
                auth = firebase.auth();
            }
        } catch (e) {
            console.error("Firebase Init Error:", e);
        }

        const MathText = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    renderMathInElement(containerRef.current, {
                        delimiters: [
                            { left: "$$", right: "$$", display: true },
                            { left: "$", right: "$", display: false },
                            { left: "\\(", right: "\\)", display: false },
                            { left: "\\[", right: "\\]", display: true }
                        ],
                        throwOnError: false
                    });
                }
            }, [text]);
            return <div ref={containerRef} className="whitespace-pre-wrap leading-relaxed">{text || ""}</div>;
        };

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [studentProfile, setStudentProfile] = useState(null);
            
            const [questions, setQuestions] = useState([]);
            const [quizList, setQuizList] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isReviewMode, setIsReviewMode] = useState(false);
            const [isNavOpen, setIsNavOpen] = useState(false);
            
            const [filters, setFilters] = useState({ 
                year: '전체', 
                session: '전체', 
                category: '전체', 
                limit: '10', 
                mode: 'PRACTICE' 
            });

            useEffect(() => {
                const initAuth = async () => {
                    if (!auth) { setLoading(false); return; }
                    try {
                        if (window.__initial_auth_token) {
                            await auth.signInWithCustomToken(window.__initial_auth_token);
                        } else if (!auth.currentUser) {
                            await auth.signInAnonymously();
                        }
                    } catch (e) { console.warn("Auth failed:", e); }
                    setLoading(false);
                };
                initAuth();
                const unsub = auth?.onAuthStateChanged(u => setUser(u));
                return () => unsub?.();
            }, []);

            useEffect(() => {
                if (!db || !user) return;
                const qRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('questions');
                const unsub = qRef.onSnapshot(s => {
                    setQuestions(s.docs.map(d => ({id: d.id, ...d.data()})));
                });
                return () => unsub();
            }, [user]);

            const handleLogin = (name, sid) => {
                if (!name || !sid) return alert("정보를 모두 입력해주세요.");
                setStudentProfile({ name, studentId: sid });
                setView('HOME');
            };

            const startQuiz = () => {
                let pool = questions.filter(q => 
                    (filters.year === '전체' || String(q.year) === filters.year) &&
                    (filters.session === '전체' || q.session === filters.session) &&
                    (filters.category === '전체' || q.category === filters.category)
                );

                if (pool.length === 0) return alert("조건에 맞는 문제가 없습니다.");

                pool = [...pool].sort(() => Math.random() - 0.5);
                if (filters.limit !== '전체') {
                    pool = pool.slice(0, parseInt(filters.limit));
                }

                setQuizList(pool);
                setAnswers({});
                setCurrentIdx(0);
                setIsReviewMode(false);
                setView('QUIZ');
            };

            const submitQuiz = () => {
                setView('RESULT');
            };

            const score = useMemo(() => {
                if (quizList.length === 0) return 0;
                const correctCount = quizList.filter((q, idx) => answers[idx] === q.correct).length;
                return Math.round((correctCount / quizList.length) * 100);
            }, [quizList, answers]);

            if (loading) return (
                <div className="h-screen flex items-center justify-center bg-white">
                    <div className="text-center">
                        <div className="w-10 h-10 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="text-sm font-bold text-slate-400">시스템 초기화 중...</p>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 shadow-2xl relative overflow-x-hidden">
                    
                    {/* Navigation Drawer */}
                    <div className={`nav-drawer ${isNavOpen ? 'open' : ''} overflow-y-auto custom-scroll`}>
                        {quizList.map((_, i) => (
                            <div key={i} onClick={() => { setCurrentIdx(i); setIsNavOpen(false); }} 
                                className={`nav-item ${currentIdx === i ? 'active' : (answers[i] !== undefined ? 'answered' : '')}`}>
                                {i + 1}
                            </div>
                        ))}
                    </div>

                    <header className="p-4 glass sticky top-0 z-50 flex justify-between items-center">
                        <div className="cursor-pointer" onClick={() => setView('HOME')}>
                            <span className="text-xl font-black text-indigo-600 italic">AERO MASTER</span>
                        </div>
                        {view === 'QUIZ' && (
                            <button onClick={() => setIsNavOpen(!isNavOpen)} className="px-3 py-1.5 bg-slate-100 text-slate-600 rounded-lg font-bold text-[10px]">
                                문항 이동
                            </button>
                        )}
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto custom-scroll">
                        {view === 'LOGIN' && (
                            <div className="flex flex-col items-center justify-center py-10 animate-in fade-in">
                                <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg text-white">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 mb-8 tracking-tight">학생 인증</h2>
                                <div className="w-full space-y-3 mb-8">
                                    <input id="l-name" type="text" placeholder="성함" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold outline-none focus:ring-2 ring-indigo-100" />
                                    <input id="l-id" type="text" placeholder="학번" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold outline-none focus:ring-2 ring-indigo-100" />
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('l-name').value, document.getElementById('l-id').value)} className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold shadow-xl active:scale-95 transition-all">시스템 접속</button>
                            </div>
                        )}

                        {view === 'HOME' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4">
                                <div className="p-6 bg-white rounded-2xl border border-slate-100 shadow-sm space-y-6">
                                    <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">학습 설정</h3>
                                    
                                    <div className="space-y-3">
                                        <label className="text-[11px] font-black text-slate-500 ml-1 uppercase">문항 수 선택</label>
                                        <div className="grid grid-cols-3 gap-2">
                                            {['5', '10', '20', '30', '60', '전체'].map(num => (
                                                <button 
                                                    key={num}
                                                    onClick={() => setFilters({...filters, limit: num})}
                                                    className={`py-2.5 rounded-xl text-xs font-bold transition-all border ${filters.limit === num ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-slate-50 border-transparent text-slate-500 hover:bg-slate-100'}`}
                                                >
                                                    {num === '전체' ? num : `${num}문항`}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-bold text-slate-400 ml-1">연도</span>
                                            <select value={filters.year} onChange={e => setFilters({...filters, year: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs outline-none border border-transparent">
                                                <option value="전체">전체</option>
                                                {[...new Set(questions.map(q => String(q.year)))].sort().reverse().map(y => <option key={y} value={y}>{y}년</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-bold text-slate-400 ml-1">과목</span>
                                            <select value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs outline-none border border-transparent">
                                                <option value="전체">전체</option>
                                                {[...new Set(questions.map(q => q.category))].sort().map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                    </div>

                                    <button onClick={startQuiz} className="w-full py-4 bg-indigo-600 text-white rounded-2xl font-black text-sm shadow-lg shadow-indigo-100 active:scale-95 transition-all">학습 시작</button>
                                </div>
                            </div>
                        )}

                        {view === 'QUIZ' && quizList[currentIdx] && (
                            <div className="pb-24 animate-in fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex gap-2">
                                        <span className="px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[9px] font-black uppercase">{quizList[currentIdx].year}년</span>
                                        <span className="px-2.5 py-1 bg-slate-900 text-white rounded-lg text-[9px] font-black uppercase">{quizList[currentIdx].category}</span>
                                    </div>
                                    <span className="text-lg font-black text-slate-800">{currentIdx + 1}<span className="text-slate-300 text-xs ml-1">/ {quizList.length}</span></span>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mb-8 font-bold text-slate-800 text-lg leading-relaxed">
                                    <MathText text={quizList[currentIdx].q} />
                                </div>
                                <div className="space-y-3">
                                    {quizList[currentIdx].options.map((opt, i) => {
                                        const isSelected = answers[currentIdx] === i;
                                        const isCorrect = quizList[currentIdx].correct === i;
                                        const showResult = isReviewMode || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined);
                                        
                                        let btnClass = "border-white bg-white hover:border-slate-100";
                                        if (isSelected) btnClass = "border-indigo-600 bg-indigo-50 ring-4 ring-indigo-50";
                                        if (showResult) {
                                            if (isCorrect) btnClass = "border-emerald-500 bg-emerald-50 text-emerald-700 ring-4 ring-emerald-50";
                                            else if (isSelected) btnClass = "border-rose-500 bg-rose-50 text-rose-700 ring-4 ring-rose-50";
                                        }

                                        return (
                                            <button 
                                                key={i} 
                                                disabled={showResult}
                                                onClick={() => setAnswers({...answers, [currentIdx]: i})} 
                                                className={`w-full p-4 text-left border-2 rounded-2xl flex gap-4 transition-all ${btnClass}`}
                                            >
                                                <span className={`w-6 h-6 rounded-lg flex items-center justify-center shrink-0 text-[10px] font-black ${isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>
                                                <div className="text-[14px] font-medium flex-1"><MathText text={opt} /></div>
                                            </button>
                                        );
                                    })}
                                </div>
                                { (isReviewMode || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined)) && (
                                    <div className="mt-8 p-6 bg-slate-900 rounded-2xl text-white text-[13px] leading-relaxed border-l-4 border-indigo-500">
                                        <div className="text-indigo-400 font-black text-[10px] mb-2 uppercase tracking-widest">정답 해설</div>
                                        <MathText text={quizList[currentIdx].exp || "해설 정보가 등록되지 않았습니다."} />
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'RESULT' && (
                            <div className="flex flex-col items-center justify-center py-10 animate-in zoom-in-95">
                                <div className="text-center mb-8">
                                    <span className="text-[11px] font-black text-slate-400 uppercase tracking-widest">최종 학습 점수</span>
                                    <h2 className="text-7xl font-black text-slate-900 mt-2 tracking-tighter">{score}<span className="text-2xl text-slate-300 ml-1 font-normal">점</span></h2>
                                </div>
                                <div className="w-full bg-white rounded-3xl p-6 border border-slate-100 shadow-xl space-y-4">
                                    <div className="flex justify-between items-center text-sm px-2">
                                        <span className="font-bold text-slate-400">맞은 문제</span>
                                        <span className="font-black text-emerald-500">{quizList.filter((q, i) => answers[i] === q.correct).length} / {quizList.length}</span>
                                    </div>
                                    <div className="h-2 w-full bg-slate-100 rounded-full overflow-hidden">
                                        <div className="h-full bg-indigo-600 transition-all duration-1000" style={{ width: `${score}%` }}></div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3 pt-4">
                                        <button onClick={() => { setIsReviewMode(true); setCurrentIdx(0); setView('QUIZ'); }} className="py-4 bg-slate-100 text-slate-600 rounded-xl font-bold text-xs hover:bg-slate-200 transition-all">오답 복습</button>
                                        <button onClick={() => setView('HOME')} className="py-4 bg-indigo-600 text-white rounded-xl font-bold text-xs shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all">홈으로</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {view === 'QUIZ' && (
                        <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 glass flex gap-3 z-50">
                            <button disabled={currentIdx === 0} onClick={() => setCurrentIdx(p => p - 1)} className="w-14 h-14 bg-slate-100 text-slate-400 rounded-2xl flex items-center justify-center disabled:opacity-20 active:scale-95 transition-all">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <button 
                                onClick={() => {
                                    if (currentIdx < quizList.length - 1) setCurrentIdx(p => p + 1);
                                    else if (!isReviewMode) { if(confirm("제출하시겠습니까?")) submitQuiz(); }
                                    else setView('RESULT');
                                }} 
                                className="flex-1 bg-slate-900 text-white rounded-2xl font-black text-sm active:scale-95 transition-all shadow-xl"
                            >
                                {currentIdx === quizList.length - 1 ? (isReviewMode ? '복습 종료' : '제출 및 종료') : '다음 문제'}
                            </button>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
