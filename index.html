<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공마스터 Pro - 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .nav-drawer {
            position: fixed; left: 0; top: 0; bottom: 0; width: 70px;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transform: translateX(-100%); transition: transform 0.3s ease; z-index: 1000; padding-top: 80px;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-item {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; margin: 0 auto 10px auto;
            border: 2px solid #f1f5f9; cursor: pointer; transition: all 0.2s;
        }
        .nav-item.active { border-color: #4f46e5; background: #4f46e5; color: white; }
        .nav-item.answered { background: #f1f5f9; color: #64748b; }
        .nav-item.correct { background: #10b981; color: white; border-color: transparent; }
        .nav-item.wrong { background: #ef4444; color: white; border-color: transparent; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Firebase Configuration From Environment
        const firebaseConfig = {
            apiKey: "AIzaSyCoSlnAX9Hqh85IBtJuGqLrJdpxRbFgwnc",
            authDomain: "airtest-422fe.firebaseapp.com",
            projectId: "airtest-422fe",
            storageBucket: "airtest-422fe.firebasestorage.app",
            messagingSenderId: "203408450908",
            appId: "1:203408450908:web:1be58ef1b4b4f4b3f5cd99",
            measurementId: "G-PC36TY5R3M"
        };

        const appId = window.__app_id || 'aviation-master-pro';
        
        // Initialize Firebase Apps
        const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MathText = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    renderMathInElement(containerRef.current, {
                        delimiters: [
                            { left: "$$", right: "$$", display: true },
                            { left: "$", right: "$", display: false },
                            { left: "\\(", right: "\\)", display: false },
                            { left: "\\[", right: "\\]", display: true }
                        ],
                        throwOnError: false
                    });
                }
            }, [text]);
            return <div ref={containerRef} className="whitespace-pre-wrap leading-relaxed">{text || ""}</div>;
        };

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [studentProfile, setStudentProfile] = useState(null);
            
            const [questions, setQuestions] = useState([]);
            const [students, setStudents] = useState([]);
            const [results, setResults] = useState([]);
            const [examConfig, setExamConfig] = useState({ active: false });
            
            const [quizList, setQuizList] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isReviewMode, setIsReviewMode] = useState(false);
            const [isNavOpen, setIsNavOpen] = useState(false);
            
            const [filters, setFilters] = useState({ 
                year: '전체', session: '전체', category: '전체', limit: '10', mode: 'PRACTICE' 
            });

            // 1. Authentication First (MANDATORY RULE 3)
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        const token = window.__initial_auth_token;
                        if (token) {
                            await auth.signInWithCustomToken(token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        console.error("Auth Error:", err);
                    }
                };
                initAuth();

                const unsubscribe = auth.onAuthStateChanged((u) => {
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            // 2. Data Fetching After Auth (MANDATORY RULE 3 & 1)
            useEffect(() => {
                if (!user) return;

                const publicPath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubQ = publicPath.collection('questions').onSnapshot(
                    s => setQuestions(s.docs.map(d => ({id: d.id, ...d.data()}))),
                    e => console.error("Q Fetch Error:", e)
                );
                
                const unsubS = publicPath.collection('students').onSnapshot(
                    s => setStudents(s.docs.map(d => ({id: d.id, ...d.data()}))),
                    e => console.error("S Fetch Error:", e)
                );
                
                const unsubR = publicPath.collection('results').onSnapshot(
                    s => setResults(s.docs.map(d => ({id: d.id, ...d.data()}))),
                    e => console.error("R Fetch Error:", e)
                );
                
                const unsubC = publicPath.collection('configs').doc('main').onSnapshot(
                    doc => { if(doc.exists) setExamConfig(doc.data().exam || { active: false }); },
                    e => console.error("Config Fetch Error:", e)
                );

                return () => { unsubQ(); unsubS(); unsubR(); unsubC(); };
            }, [user]);

            const handleLogin = (name, sid) => {
                if (!name || !sid) return alert("정보를 입력하세요.");
                // 학생 명단이 로드된 경우에만 체크 (관리자 편의를 위해 명단 없을시 통과)
                if (students.length > 0) {
                    const found = students.find(s => s.name === name && String(s.studentId) === String(sid));
                    if (!found) return alert("등록되지 않은 학생 정보입니다.");
                }
                setStudentProfile({ name, studentId: sid });
                setView('HOME');
            };

            const startQuiz = () => {
                if (filters.mode === 'EXAM' && !examConfig.active) {
                    return alert("현재 관리자가 시험 모드를 비활성화했습니다. 대기해주세요.");
                }

                let pool = questions.filter(q => 
                    (filters.year === '전체' || String(q.year) === filters.year) &&
                    (filters.session === '전체' || q.session === filters.session) &&
                    (filters.category === '전체' || q.category === filters.category)
                );

                if (pool.length === 0) return alert("해당 조건의 문제가 없습니다.");

                pool = [...pool].sort(() => Math.random() - 0.5);
                if (filters.limit !== '전체') pool = pool.slice(0, parseInt(filters.limit));

                setQuizList(pool);
                setAnswers({});
                setCurrentIdx(0);
                setIsReviewMode(false);
                setView('QUIZ');
            };

            const submitQuiz = async () => {
                if (!user) return;
                const correctCount = quizList.filter((q, idx) => answers[idx] === q.correct).length;
                const finalScore = Math.round((correctCount / quizList.length) * 100);
                
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').add({
                        name: studentProfile.name,
                        studentId: studentProfile.studentId,
                        score: finalScore,
                        correct: correctCount,
                        total: quizList.length,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        mode: filters.mode,
                        uid: user.uid
                    });
                    setView('RESULT');
                } catch (e) {
                    alert("결과 저장 중 오류가 발생했습니다.");
                }
            };

            // Admin Actions
            const uploadQuestions = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        const batch = db.batch();
                        const qRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('questions');
                        data.forEach((q, i) => {
                            const id = q.id || `q_${Date.now()}_${i}`;
                            batch.set(qRef.doc(id), q);
                        });
                        await batch.commit();
                        alert(`${data.length}개 문항 업로드 성공!`);
                    } catch (err) { alert("JSON 파일 형식이 잘못되었습니다."); }
                };
                reader.readAsText(file);
            };

            const uploadStudents = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const lines = evt.target.result.split('\n').filter(l => l.trim());
                        const batch = db.batch();
                        const sRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
                        let count = 0;
                        lines.forEach(line => {
                            const parts = line.split(',').map(s => s.trim());
                            if (parts.length >= 2) {
                                const [name, sid] = parts;
                                batch.set(sRef.doc(sid), { name, studentId: sid });
                                count++;
                            }
                        });
                        await batch.commit();
                        alert(`${count}명의 학생 등록 완료!`);
                    } catch (err) { alert("CSV 파일 형식이 잘못되었습니다 (이름,학번 형태 권장)."); }
                };
                reader.readAsText(file);
            };

            const toggleExam = async () => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('configs').doc('main').set({
                    exam: { active: !examConfig.active }
                }, { merge: true });
            };

            const exportResults = () => {
                if (results.length === 0) return alert("추출할 데이터가 없습니다.");
                const header = "이름,학번,점수,맞은개수,전체문항,모드,일시\n";
                const rows = results.map(r => {
                    const date = r.timestamp?.toDate ? r.timestamp.toDate().toLocaleString() : '진행중';
                    return `${r.name},${r.studentId},${r.score},${r.correct},${r.total},${r.mode},${date}`;
                }).join("\n");
                const blob = new Blob(["\uFEFF" + header + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `항공마스터_성적표_${new Date().toISOString().slice(0,10)}.csv`;
                link.click();
            };

            if (loading) return <div className="h-screen flex flex-col items-center justify-center text-slate-400 font-bold bg-slate-900">
                <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                인증 확인 중...
            </div>;

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 shadow-2xl relative">
                    
                    {/* Navigation Drawer (Sidebar) */}
                    <div className={`nav-drawer ${isNavOpen ? 'open' : ''} overflow-y-auto custom-scroll`}>
                        <div className="px-4 py-6">
                            <h4 className="text-[10px] font-black text-slate-300 mb-4 text-center uppercase tracking-tighter">문항 이동</h4>
                            {quizList.map((_, i) => {
                                let status = "";
                                if (isReviewMode) {
                                    status = answers[i] === quizList[i].correct ? "correct" : "wrong";
                                } else if (answers[i] !== undefined) {
                                    status = "answered";
                                }
                                return (
                                    <div key={i} onClick={() => { setCurrentIdx(i); setIsNavOpen(false); }} 
                                        className={`nav-item ${currentIdx === i ? 'active' : ''} ${status}`}>
                                        {i + 1}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <header className="p-4 glass sticky top-0 z-[1001] flex justify-between items-center">
                        <div className="cursor-pointer flex items-center gap-2" onClick={() => setView('HOME')}>
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-xs italic">A</div>
                            <span className="text-lg font-black text-slate-800 tracking-tighter uppercase italic">Master Pro</span>
                        </div>
                        <div className="flex gap-2">
                            {view === 'QUIZ' && (
                                <button onClick={() => setIsNavOpen(!isNavOpen)} className="px-3 py-1.5 bg-slate-100 rounded-xl text-[10px] font-black text-slate-600 border border-slate-200">
                                    {isNavOpen ? '닫기' : '문항'}
                                </button>
                            )}
                            <button onClick={() => setView('ADMIN')} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-6">
                        {view === 'LOGIN' && (
                            <div className="flex flex-col items-center justify-center py-12 animate-in fade-in zoom-in-95">
                                <div className="text-center mb-10">
                                    <h2 className="text-3xl font-black text-slate-900 tracking-tighter">학생 인증</h2>
                                    <p className="text-slate-400 text-sm mt-1 font-medium">관리 시스템에 로그인하여 학습을 시작하세요</p>
                                </div>
                                <div className="w-full space-y-3 mb-8">
                                    <div className="space-y-1">
                                        <span className="text-[10px] font-black text-slate-400 ml-1 uppercase">Name</span>
                                        <input id="l-name" type="text" placeholder="성함을 입력하세요" className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" />
                                    </div>
                                    <div className="space-y-1">
                                        <span className="text-[10px] font-black text-slate-400 ml-1 uppercase">Student ID</span>
                                        <input id="l-id" type="text" placeholder="학번을 입력하세요" className="w-full p-4 bg-white border border-slate-200 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" />
                                    </div>
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('l-name').value, document.getElementById('l-id').value)} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-[0.98]">접속하기</button>
                            </div>
                        )}

                        {view === 'HOME' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-6">
                                <div className="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm space-y-6">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Setup Session</h3>
                                        {filters.mode === 'EXAM' && (
                                            <span className={`px-2 py-0.5 rounded-full text-[9px] font-black ${examConfig.active ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                {examConfig.active ? '시험 가능' : '시험 비활성'}
                                            </span>
                                        )}
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-2 bg-slate-50 p-1 rounded-2xl">
                                        <button onClick={() => setFilters({...filters, mode: 'PRACTICE'})} className={`py-3 rounded-xl font-black text-xs transition-all ${filters.mode === 'PRACTICE' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}>연습 모드</button>
                                        <button onClick={() => setFilters({...filters, mode: 'EXAM'})} className={`py-3 rounded-xl font-black text-xs transition-all ${filters.mode === 'EXAM' ? 'bg-slate-900 text-white shadow-md' : 'text-slate-400 hover:text-slate-600'}`}>시험 모드</button>
                                    </div>

                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="space-y-1">
                                                <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Year</span>
                                                <select value={filters.year} onChange={e => setFilters({...filters, year: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs border border-slate-100 outline-none">
                                                    <option value="전체">전체 연도</option>
                                                    {[...new Set(questions.map(q => String(q.year)))].sort().reverse().map(y => <option key={y} value={y}>{y}년</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1">
                                                <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Session</span>
                                                <select value={filters.session} onChange={e => setFilters({...filters, session: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs border border-slate-100 outline-none">
                                                    <option value="전체">전체 회차</option>
                                                    {[...new Set(questions.map(q => q.session))].sort().map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-1">
                                            <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Category</span>
                                            <select value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs border border-slate-100 outline-none">
                                                <option value="전체">전체 과목</option>
                                                {[...new Set(questions.map(q => q.category))].sort().map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-3">
                                            <span className="text-[10px] font-bold text-slate-400 ml-1 uppercase">Question Limit</span>
                                            <div className="grid grid-cols-3 gap-2">
                                                {['10', '20', '40', '60', '80', '전체'].map(num => (
                                                    <button key={num} onClick={() => setFilters({...filters, limit: num})} className={`py-2.5 rounded-xl text-[11px] font-bold border transition-all ${filters.limit === num ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-slate-50 border-transparent text-slate-500 hover:bg-slate-100'}`}>{num === '전체' ? num : `${num}문항`}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={startQuiz} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-sm shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-[0.98]">학습/시험 시작</button>
                                </div>
                            </div>
                        )}

                        {view === 'QUIZ' && quizList[currentIdx] && (
                            <div className="pb-32 animate-in fade-in">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex gap-2">
                                        <span className="px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-black uppercase">{quizList[currentIdx].year}년 {quizList[currentIdx].session}</span>
                                        <span className="px-2.5 py-1 bg-slate-900 text-white rounded-lg text-[10px] font-black uppercase">{quizList[currentIdx].category}</span>
                                    </div>
                                    <span className="text-xl font-black text-slate-800">{currentIdx + 1}<span className="text-slate-300 text-xs ml-1">/ {quizList.length}</span></span>
                                </div>
                                <div className="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm mb-8 font-bold text-slate-800 text-lg leading-relaxed min-h-[140px]">
                                    <MathText text={quizList[currentIdx].q} />
                                </div>
                                <div className="space-y-3">
                                    {quizList[currentIdx].options.map((opt, i) => {
                                        const isSelected = answers[currentIdx] === i;
                                        const isCorrect = quizList[currentIdx].correct === i;
                                        const showResult = isReviewMode || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined);
                                        
                                        let btnClass = "border-white bg-white hover:border-slate-100";
                                        if (isSelected) btnClass = "border-indigo-600 bg-indigo-50 ring-4 ring-indigo-50/50";
                                        
                                        if (showResult) {
                                            if (isCorrect) btnClass = "border-emerald-500 bg-emerald-50 text-emerald-700 ring-4 ring-emerald-50";
                                            else if (isSelected) btnClass = "border-rose-500 bg-rose-50 text-rose-700 ring-4 ring-rose-50";
                                        }
                                        
                                        return (
                                            <button key={i} disabled={showResult} onClick={() => setAnswers({...answers, [currentIdx]: i})} className={`w-full p-4 text-left border-2 rounded-2xl flex gap-4 transition-all duration-300 ${btnClass}`}>
                                                <span className={`w-6 h-6 rounded-lg flex items-center justify-center shrink-0 text-[10px] font-black ${isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>
                                                <div className="text-[15px] font-medium flex-1 pt-0.5"><MathText text={opt} /></div>
                                            </button>
                                        );
                                    })}
                                </div>
                                {(isReviewMode || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined)) && (
                                    <div className="mt-8 p-6 bg-slate-900 rounded-3xl text-white text-[13px] border-l-8 border-indigo-500 animate-in slide-in-from-top-4">
                                        <div className="text-indigo-400 font-black text-[10px] mb-3 uppercase tracking-[0.2em]">Explanatory Note</div>
                                        <MathText text={quizList[currentIdx].exp || "해당 문항의 해설 정보가 존재하지 않습니다."} />
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'RESULT' && (
                            <div className="flex flex-col items-center justify-center py-12 animate-in zoom-in-95">
                                <div className="text-center mb-10">
                                    <span className="text-[12px] font-black text-slate-400 uppercase tracking-widest">Final Performance</span>
                                    <h2 className="text-8xl font-black text-slate-900 mt-2 tracking-tighter">
                                        {Math.round((quizList.filter((q, i) => answers[i] === q.correct).length / quizList.length) * 100)}
                                        <span className="text-3xl text-slate-300 font-normal">/100</span>
                                    </h2>
                                    <p className="mt-4 text-slate-500 font-bold">
                                        {quizList.length}문항 중 {quizList.filter((q, i) => answers[i] === q.correct).length}개 정답
                                    </p>
                                </div>
                                <div className="w-full bg-white rounded-[40px] p-8 border border-slate-100 shadow-2xl shadow-indigo-100/50 space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <button onClick={() => { setIsReviewMode(true); setCurrentIdx(0); setView('QUIZ'); }} className="py-5 bg-slate-100 text-slate-700 rounded-2xl font-black text-xs hover:bg-slate-200 transition-all">복습 모드</button>
                                        <button onClick={() => setView('HOME')} className="py-5 bg-indigo-600 text-white rounded-2xl font-black text-xs shadow-xl shadow-indigo-200 hover:bg-indigo-700 transition-all">메인 홈으로</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'ADMIN' && (
                            <div className="space-y-6 animate-in fade-in pb-24">
                                <div className="flex justify-between items-end mb-2">
                                    <div>
                                        <h3 className="font-black text-slate-800 text-2xl tracking-tighter">관리자 대시보드</h3>
                                        <p className="text-[10px] text-slate-400 font-bold uppercase">System Control Unit</p>
                                    </div>
                                    <button onClick={toggleExam} className={`px-5 py-2.5 rounded-2xl text-[11px] font-black shadow-sm transition-all ${examConfig.active ? 'bg-rose-500 text-white animate-pulse' : 'bg-slate-200 text-slate-600'}`}>
                                        {examConfig.active ? '시험 종료하기' : '시험 모드 활성화'}
                                    </button>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="p-5 bg-white rounded-[32px] border border-slate-100 shadow-sm text-center">
                                        <div className="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
                                        </div>
                                        <span className="text-[10px] font-black text-slate-400 uppercase block mb-3">Questions (JSON)</span>
                                        <input type="file" id="up-q" className="hidden" accept=".json" onChange={uploadQuestions} />
                                        <label htmlFor="up-q" className="block w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-bold cursor-pointer hover:bg-indigo-600 transition-all">파일 업로드</label>
                                    </div>
                                    <div className="p-5 bg-white rounded-[32px] border border-slate-100 shadow-sm text-center">
                                        <div className="w-10 h-10 bg-emerald-50 text-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                                            <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path></svg>
                                        </div>
                                        <span className="text-[10px] font-black text-slate-400 uppercase block mb-3">Students (CSV)</span>
                                        <input type="file" id="up-s" className="hidden" accept=".csv" onChange={uploadStudents} />
                                        <label htmlFor="up-s" className="block w-full py-3 bg-slate-900 text-white rounded-xl text-[10px] font-bold cursor-pointer hover:bg-emerald-600 transition-all">파일 업로드</label>
                                    </div>
                                </div>

                                <div className="p-6 bg-white rounded-[40px] border border-slate-100 shadow-sm">
                                    <div className="flex justify-between items-center mb-6">
                                        <h4 className="text-[11px] font-black text-slate-400 uppercase tracking-widest">Grading Reports ({results.length})</h4>
                                        <button onClick={exportResults} className="px-4 py-2 bg-indigo-50 text-indigo-600 rounded-xl text-[10px] font-black hover:bg-indigo-100 transition-all">엑셀 다운로드</button>
                                    </div>
                                    <div className="max-h-[350px] overflow-y-auto custom-scroll space-y-3 pr-1">
                                        {results.length === 0 ? (
                                            <div className="py-20 text-center text-slate-300 font-bold text-xs">기록된 시험 결과가 없습니다.</div>
                                        ) : (
                                            results.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)).map((r, i) => (
                                                <div key={i} className="flex justify-between items-center p-4 bg-slate-50 rounded-2xl border border-slate-100 group hover:border-indigo-200 transition-all">
                                                    <div className="flex flex-col">
                                                        <span className="text-[13px] font-black text-slate-800">{r.name} ({r.studentId})</span>
                                                        <span className="text-[9px] text-slate-400 font-medium">
                                                            {r.timestamp?.toDate ? r.timestamp.toDate().toLocaleString() : 'Saving...'} | {r.mode}
                                                        </span>
                                                    </div>
                                                    <div className={`px-3 py-1.5 rounded-xl font-black text-xs ${r.score >= 60 ? 'bg-emerald-100 text-emerald-600' : 'bg-rose-100 text-rose-600'}`}>
                                                        {r.score}점
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {view === 'QUIZ' && (
                        <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 glass flex gap-3 z-[1001]">
                            <button disabled={currentIdx === 0} onClick={() => { setCurrentIdx(p => p - 1); setIsNavOpen(false); }} className="w-16 h-16 bg-slate-100 text-slate-400 rounded-[24px] flex items-center justify-center disabled:opacity-30 transition-all hover:bg-slate-200">
                                <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <button 
                                onClick={() => {
                                    if (currentIdx < quizList.length - 1) {
                                        setCurrentIdx(p => p + 1);
                                        setIsNavOpen(false);
                                    } else if (!isReviewMode) {
                                        if(confirm("모든 답안을 제출하시겠습니까?")) submitQuiz();
                                    } else {
                                        setView('RESULT');
                                    }
                                }} 
                                className="flex-1 bg-slate-900 text-white rounded-[24px] font-black text-sm shadow-2xl active:scale-[0.97] transition-all hover:bg-black"
                            >
                                {currentIdx === quizList.length - 1 ? (isReviewMode ? '복습 완료' : '최종 답안 제출') : '다음 문항으로'}
                            </button>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
