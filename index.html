<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공마스터 Pro - 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX for Math Symbols -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-drawer {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; padding-top: 80px;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-item {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; margin: 0 auto 10px auto;
            border: 2px solid #f1f5f9; cursor: pointer;
        }
        .nav-item.active { background: #4f46e5; color: white; border-color: transparent; }
        .nav-item.correct { background: #10b981; color: white; border-color: transparent; }
        .nav-item.wrong { background: #ef4444; color: white; border-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        select { -webkit-appearance: none; appearance: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase Config ---
        const firebaseConfig = {
            apiKey: "AIzaSyCoSlnAX9Hqh85IBtJuGqLrJdpxRbFgwnc",
            authDomain: "airtest-422fe.firebaseapp.com",
            projectId: "airtest-422fe",
            storageBucket: "airtest-422fe.firebasestorage.app",
            messagingSenderId: "203408450908",
            appId: "1:203408450908:web:1be58ef1b4b4f4b3f5cd99",
            measurementId: "G-PC36TY5R3M"
        };
        const appId = "airtest-admin"; 
        
        let db, auth;
        try {
            if (typeof firebase !== 'undefined') {
                const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
                db = firebase.firestore();
                db.settings({ experimentalForceLongPolling: true });
                auth = firebase.auth();
            }
        } catch (e) { console.error("Firebase Init Error:", e); }

        const MathText = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current && typeof renderMathInElement !== 'undefined') {
                    renderMathInElement(containerRef.current, {
                        delimiters: [
                            { left: "$$", right: "$$", display: true },
                            { left: "$", right: "$", display: false },
                            { left: "\\(", right: "\\)", display: false },
                            { left: "\\[", right: "\\]", display: true }
                        ],
                        throwOnError: false
                    });
                }
            }, [text]);
            return <div ref={containerRef} className="whitespace-pre-wrap leading-relaxed">{text || ""}</div>;
        };

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            
            const [questions, setQuestions] = useState([]);
            const [students, setStudents] = useState([]);
            const [results, setResults] = useState([]);
            const [config, setConfig] = useState({ examModeOnly: false });
            const [studentProfile, setStudentProfile] = useState(null);
            const [adminTab, setAdminTab] = useState('DASHBOARD');

            const [filters, setFilters] = useState({ year: '전체', session: '전체', category: '전체', limit: '20', mode: 'PRACTICE' });
            const [quizList, setQuizList] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isReview, setIsReview] = useState(false);
            const [isNavOpen, setIsNavOpen] = useState(false);

            useEffect(() => {
                if (!auth) { setLoading(false); return; }
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) setUser(u);
                    else { try { await auth.signInAnonymously(); } catch (err) { } }
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const path = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubQuestions = path.collection('questions').onSnapshot(s => setQuestions(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubResults = path.collection('results').onSnapshot(s => setResults(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubStudents = path.collection('students').onSnapshot(s => setStudents(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubConfig = path.collection('config').doc('global').onSnapshot(s => { if(s.exists) setConfig(s.data()); });

                return () => { unsubQuestions(); unsubResults(); unsubStudents(); unsubConfig(); };
            }, [user]);

            const updateGlobalConfig = async (newConfig) => {
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('config').doc('global').set(newConfig, { merge: true });
                } catch (e) { }
            };

            const handleLogin = (name, sid) => {
                if (!name || !sid) return alert("정보를 입력해주세요.");
                const found = students.find(s => s.name === name && String(s.studentId) === String(sid));
                if (!found && students.length > 0) return alert("등록되지 않은 학생입니다.");
                setStudentProfile({ name, studentId: sid });
                setView('HOME');
            };

            const startQuiz = () => {
                let pool = questions.filter(q => 
                    (filters.year === '전체' || String(q.year) === filters.year) &&
                    (filters.session === '전체' || q.session === filters.session) &&
                    (filters.category === '전체' || q.category === filters.category)
                );
                if (pool.length === 0) return alert("해당 조건의 문제가 없습니다.");
                
                pool = [...pool].sort(() => Math.random() - 0.5);
                if (filters.limit !== '전체') pool = pool.slice(0, parseInt(filters.limit));
                
                setQuizList(pool);
                setAnswers({});
                setCurrentIdx(0);
                setIsReview(false);
                setIsNavOpen(false);
                setView('QUIZ');
            };

            const submitQuiz = async () => {
                if (isSubmitting) return;
                setIsSubmitting(true);
                
                const categoryFeedback = {};
                quizList.forEach((q, idx) => {
                    const cat = q.category || "미분류";
                    if(!categoryFeedback[cat]) categoryFeedback[cat] = { correct: 0, total: 0 };
                    categoryFeedback[cat].total++;
                    if(answers[idx] === q.correct) categoryFeedback[cat].correct++;
                });
                const correctCount = quizList.reduce((acc, q, idx) => acc + (answers[idx] === q.correct ? 1 : 0), 0);
                const score = Math.round((correctCount / quizList.length) * 100);
                
                const resultData = {
                    name: studentProfile.name,
                    studentId: studentProfile.studentId,
                    score,
                    correct: correctCount,
                    total: quizList.length,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    mode: config.examModeOnly ? 'EXAM' : filters.mode,
                    feedback: categoryFeedback
                };

                const savePromise = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').add(resultData);
                const timeoutPromise = new Promise((_, reject) => setTimeout(() => reject(new Error("Timeout")), 4000));

                try {
                    await Promise.race([savePromise, timeoutPromise]);
                } catch (e) {
                    console.warn("Offline Save Mode");
                } finally {
                    setIsSubmitting(false);
                    setView('RESULT');
                }
            };

            // 추출 가능한 카테고리/연도/회차 목록
            const availableCategories = useMemo(() => ['전체', ...new Set(questions.map(q => q.category).filter(Boolean))].sort(), [questions]);
            const availableYears = useMemo(() => ['전체', ...new Set(questions.map(q => String(q.year)).filter(Boolean))].sort().reverse(), [questions]);
            const availableSessions = useMemo(() => ['전체', ...new Set(questions.map(q => q.session).filter(Boolean))].sort(), [questions]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900">
                    <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 relative shadow-2xl border-x border-slate-200">
                    
                    <div className={`nav-drawer ${isNavOpen ? 'open' : ''} overflow-y-auto custom-scroll`}>
                        {quizList.map((_, i) => (
                            <div key={i} onClick={() => { setCurrentIdx(i); setIsNavOpen(false); }} 
                                className={`nav-item ${currentIdx === i ? 'active' : ''} ${isReview || (filters.mode === 'PRACTICE' && !config.examModeOnly && answers[i] !== undefined) ? (answers[i] === quizList[i].correct ? 'correct' : 'wrong') : (answers[i] !== undefined ? 'bg-indigo-100' : '')}`}>
                                {i + 1}
                            </div>
                        ))}
                    </div>

                    <header className="p-4 glass sticky top-0 z-50 flex justify-between items-center">
                        <div onClick={() => !isSubmitting && setView('HOME')} className="cursor-pointer">
                            <span className="text-xl font-black text-indigo-600 italic tracking-tighter">AERO MASTER</span>
                        </div>
                        <div className="flex gap-2">
                            {view === 'QUIZ' && <button onClick={() => setIsNavOpen(!isNavOpen)} className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg font-black text-[10px]">색인</button>}
                            <button onClick={() => { const pw = prompt("암호"); if(pw === '1111') setView('ADMIN'); }} className="p-2 bg-slate-100 rounded-lg text-slate-400">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto custom-scroll">
                        {view === 'LOGIN' && (
                            <div className="h-full flex flex-col items-center justify-center py-10">
                                <h2 className="text-2xl font-black text-slate-800 mb-2">학습자 로그인</h2>
                                <p className="text-slate-400 text-xs mb-8 text-center">성함과 학번을 입력해 주세요.</p>
                                <div className="w-full space-y-3 mb-8">
                                    <input id="l-name" type="text" placeholder="성함" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold" />
                                    <input id="l-id" type="text" placeholder="학번" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold" />
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('l-name').value, document.getElementById('l-id').value)} className="w-full py-4 bg-slate-900 text-white rounded-xl font-black shadow-xl">시스템 접속</button>
                            </div>
                        )}

                        {view === 'HOME' && (
                            <div className="space-y-6">
                                <div className="p-6 bg-white rounded-2xl border border-slate-100 shadow-sm space-y-6">
                                    <div>
                                        <h3 className="text-[10px] font-black text-slate-400 mb-3 uppercase tracking-widest">학습 모드</h3>
                                        <div className="grid grid-cols-2 gap-2">
                                            <button 
                                                disabled={config.examModeOnly}
                                                onClick={() => setFilters({...filters, mode: 'PRACTICE'})} 
                                                className={`py-3 rounded-xl font-black text-xs border-2 transition-all ${filters.mode === 'PRACTICE' && !config.examModeOnly ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-slate-50 text-slate-300'}`}
                                            >
                                                자율 연습 {config.examModeOnly && "🔒"}
                                            </button>
                                            <button 
                                                onClick={() => setFilters({...filters, mode: 'EXAM'})} 
                                                className={`py-3 rounded-xl font-black text-xs border-2 transition-all ${filters.mode === 'EXAM' || config.examModeOnly ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-50 text-slate-400'}`}
                                            >
                                                실전 시험
                                            </button>
                                        </div>
                                        {config.examModeOnly && <p className="text-[10px] text-rose-500 font-bold mt-2 text-center">관리자 설정에 의해 시험 모드만 가능합니다.</p>}
                                    </div>

                                    <div className="space-y-4">
                                        <h3 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">상세 설정</h3>
                                        
                                        <div className="flex flex-col gap-1.5">
                                            <label className="text-[10px] font-bold text-slate-500 ml-1">과목(카테고리) 선택</label>
                                            <div className="relative">
                                                <select value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})} className="w-full p-3.5 bg-slate-50 border border-slate-100 rounded-xl font-bold text-xs appearance-none">
                                                    {availableCategories.map(cat => <option key={cat} value={cat}>{cat}</option>)}
                                                </select>
                                                <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                                                    <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M19 9l-7 7-7-7"></path></svg>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            <div className="flex flex-col gap-1.5">
                                                <label className="text-[10px] font-bold text-slate-500 ml-1">기출 연도</label>
                                                <select value={filters.year} onChange={e => setFilters({...filters, year: e.target.value})} className="p-3.5 bg-slate-50 border border-slate-100 rounded-xl font-bold text-xs">
                                                    {availableYears.map(y => <option key={y} value={y}>{y === '전체' ? y : y+'년'}</option>)}
                                                </select>
                                            </div>
                                            <div className="flex flex-col gap-1.5">
                                                <label className="text-[10px] font-bold text-slate-500 ml-1">기출 회차</label>
                                                <select value={filters.session} onChange={e => setFilters({...filters, session: e.target.value})} className="p-3.5 bg-slate-50 border border-slate-100 rounded-xl font-bold text-xs">
                                                    {availableSessions.map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        
                                        <div className="flex flex-col gap-2 pt-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1">문항수</label>
                                            <div className="grid grid-cols-3 gap-2">
                                                {['5', '10', '20', '30', '60', '전체'].map(num => (
                                                    <button key={num} onClick={() => setFilters({...filters, limit: num})} className={`py-2 rounded-lg text-[10px] font-bold border ${filters.limit === num ? 'bg-indigo-600 border-indigo-600 text-white shadow-md shadow-indigo-100' : 'bg-white border-slate-200 text-slate-500'}`}>
                                                        {num === '전체' ? '전체' : `${num}문항`}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <button onClick={startQuiz} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-black text-sm shadow-xl mt-4 active:scale-95 transition-transform">학습 시작</button>
                                </div>
                            </div>
                        )}

                        {view === 'QUIZ' && quizList[currentIdx] && (
                            <div className="pb-24">
                                <div className="flex justify-between items-center mb-6">
                                    <span className="px-3 py-1 bg-indigo-600 text-white rounded-lg text-[9px] font-black shadow-sm">{quizList[currentIdx].category}</span>
                                    <span className="text-lg font-black text-slate-800">{currentIdx + 1}<span className="text-slate-300 text-xs ml-1">/ {quizList.length}</span></span>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mb-6 font-bold text-slate-800 text-lg leading-relaxed">
                                    <MathText text={quizList[currentIdx].q} />
                                </div>
                                <div className="space-y-3">
                                    {quizList[currentIdx].options.map((opt, i) => {
                                        const selected = answers[currentIdx] === i;
                                        const showResult = isReview || (filters.mode === 'PRACTICE' && !config.examModeOnly && answers[currentIdx] !== undefined);
                                        const isCorrect = quizList[currentIdx].correct === i;
                                        
                                        let style = "border-slate-100 bg-white";
                                        if (selected) style = "border-indigo-600 bg-indigo-50 ring-2 ring-indigo-100";
                                        if (showResult) {
                                            if (isCorrect) style = "border-emerald-500 bg-emerald-50 ring-2 ring-emerald-100";
                                            else if (selected) style = "border-rose-500 bg-rose-50 ring-2 ring-rose-100";
                                        }
                                        
                                        return (
                                            <button key={i} disabled={showResult} onClick={() => setAnswers({...answers, [currentIdx]: i})} className={`w-full p-4 text-left border-2 rounded-xl flex gap-3 transition-all ${style}`}>
                                                <span className={`w-6 h-6 rounded flex items-center justify-center shrink-0 text-[10px] font-black ${selected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>
                                                <div className="text-[13px] font-semibold"><MathText text={opt} /></div>
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {view === 'RESULT' && (
                            <div className="space-y-6 pb-10">
                                <div className="text-center py-10 bg-white rounded-3xl shadow-xl border border-slate-100">
                                    <p className="text-[10px] font-black text-slate-300 uppercase mb-1">성적 리포트</p>
                                    <h2 className="text-6xl font-black text-slate-900 mb-2">{reportData?.score || 0}<span className="text-xl text-slate-200 ml-1">점</span></h2>
                                    <p className="text-xs font-bold text-slate-400">{reportData?.total}문항 중 {reportData?.correctCount}개 정답</p>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm">
                                    <h3 className="text-[10px] font-black text-slate-400 mb-4 uppercase tracking-widest">과목별 성취도</h3>
                                    <div className="space-y-4">
                                        {reportData && Object.entries(reportData.feedback).map(([cat, stat]) => {
                                            const percent = Math.round((stat.correct / stat.total) * 100);
                                            const isLow = percent < 60;
                                            return (
                                                <div key={cat} className="space-y-1">
                                                    <div className="flex justify-between text-[11px] font-bold">
                                                        <span className="text-slate-600">{cat} {isLow && <span className="text-rose-500 ml-1">[약점]</span>}</span>
                                                        <span className={isLow ? 'text-rose-500' : 'text-emerald-600'}>{percent}%</span>
                                                    </div>
                                                    <div className="w-full h-2 bg-slate-100 rounded-full overflow-hidden">
                                                        <div className={`h-full transition-all duration-1000 ${isLow ? 'bg-rose-400' : 'bg-emerald-500'}`} style={{ width: `${percent}%` }}></div>
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3">
                                    <button onClick={() => { setIsReview(true); setView('QUIZ'); setCurrentIdx(0); }} className="py-4 bg-slate-900 text-white rounded-xl font-black text-xs shadow-lg">오답 다시보기</button>
                                    <button onClick={() => setView('HOME')} className="py-4 bg-white border border-slate-200 text-slate-500 rounded-xl font-black text-xs">처음으로</button>
                                </div>
                            </div>
                        )}

                        {view === 'ADMIN' && (
                            <div className="space-y-6 pb-20">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-black text-slate-800 text-xl">관리 설정</h3>
                                    <button onClick={() => setView('HOME')} className="text-[10px] font-bold text-indigo-600">닫기</button>
                                </div>
                                <div className="p-4 bg-indigo-50 rounded-2xl flex justify-between items-center border border-indigo-100">
                                    <div>
                                        <p className="text-xs font-black text-indigo-900">전체 시험 모드 강제</p>
                                        <p className="text-[9px] text-indigo-600">학생은 무조건 시험으로만 응시 가능</p>
                                    </div>
                                    <button 
                                        onClick={() => updateGlobalConfig({ examModeOnly: !config.examModeOnly })}
                                        className={`w-12 h-6 rounded-full transition-colors relative ${config.examModeOnly ? 'bg-indigo-600' : 'bg-slate-300'}`}
                                    >
                                        <div className={`absolute top-1 w-4 h-4 bg-white rounded-full transition-transform ${config.examModeOnly ? 'translate-x-7' : 'translate-x-1'}`}></div>
                                    </button>
                                </div>
                                <div className="flex border-b border-slate-200">
                                    <button onClick={() => setAdminTab('DASHBOARD')} className={`flex-1 py-3 text-xs font-black ${adminTab === 'DASHBOARD' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400'}`}>성적 로그</button>
                                    <button onClick={() => setAdminTab('UPLOAD')} className={`flex-1 py-3 text-xs font-black ${adminTab === 'UPLOAD' ? 'text-indigo-600 border-b-2 border-indigo-600' : 'text-slate-400'}`}>DB 관리</button>
                                </div>
                                {adminTab === 'DASHBOARD' ? (
                                    <div className="space-y-3">
                                        {results.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)).map((r, i) => (
                                            <div key={i} className="p-4 bg-white rounded-xl border border-slate-100 flex justify-between items-center text-[11px]">
                                                <div>
                                                    <div className="font-black text-slate-800">{r.name} ({r.studentId})</div>
                                                    <div className="text-[9px] text-slate-400">{r.timestamp ? new Date(r.timestamp.seconds * 1000).toLocaleString() : 'Saving...'}</div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="font-black text-indigo-600">{r.score}점</div>
                                                    <div className={`text-[8px] px-1.5 py-0.5 rounded ${r.mode === 'EXAM' ? 'bg-rose-100 text-rose-600' : 'bg-slate-100 text-slate-600'}`}>
                                                        {r.mode === 'EXAM' ? '시험' : '연습'}
                                                    </div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="p-4 bg-white rounded-xl border border-slate-100 space-y-4">
                                        <p className="text-[10px] font-bold text-slate-400">JSON 데이터 업로드</p>
                                        <input type="file" accept=".json" onChange={(e) => {
                                            const file = e.target.files[0];
                                            const reader = new FileReader();
                                            reader.onload = async (ev) => {
                                                const data = JSON.parse(ev.target.result);
                                                const batch = db.batch();
                                                const coll = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('questions');
                                                data.forEach(q => batch.set(coll.doc(), q));
                                                await batch.commit();
                                                alert("완료");
                                            };
                                            reader.readAsText(file);
                                        }} className="w-full text-xs" />
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {view === 'QUIZ' && (
                        <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 glass flex gap-3 z-40">
                            <button disabled={currentIdx === 0} onClick={() => setCurrentIdx(p => p - 1)} className="w-12 h-12 bg-slate-100 text-slate-500 rounded-xl flex items-center justify-center disabled:opacity-20">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <button 
                                disabled={isSubmitting}
                                onClick={() => { 
                                    if (currentIdx < quizList.length - 1) { 
                                        setCurrentIdx(p => p + 1); 
                                    } else if(!isReview) { 
                                        if (confirm("시험을 종료하고 제출하시겠습니까?")) submitQuiz(); 
                                    } else { 
                                        setView('RESULT'); 
                                    } 
                                }} 
                                className={`flex-1 py-3 text-white rounded-xl font-black text-xs shadow-lg transition-all ${isSubmitting ? 'bg-slate-400 animate-pulse' : 'bg-indigo-600'}`}
                            >
                                {isSubmitting ? '채점 중...' : (currentIdx === quizList.length - 1 ? (isReview ? '리뷰 종료' : '최종 제출') : '다음 문제')}
                            </button>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
