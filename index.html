<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>항공기정비기능사 기출 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="data.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script>
        const { useState, useMemo, useEffect } = React;
        const e = React.createElement;

        function App() {
            const quizzes = typeof MASTER_QUIZ_DATA !== 'undefined' ? MASTER_QUIZ_DATA : [];
            const [mode, setMode] = useState("연습"); // 연습 or 시험
            const [filters, setFilters] = useState({ years: [], ch: "전체", count: 5 });
            const [userAnswers, setUserAnswers] = useState({});
            const [submitted, setSubmitted] = useState(false);
            const [history, setHistory] = useState([]);

            useEffect(() => {
                const saved = localStorage.getItem("quiz_history");
                if (saved) setHistory(JSON.parse(saved));
            }, []);

            const availableYears = useMemo(() => [...new Set(quizzes.map(q => q.year))].sort().reverse(), [quizzes]);
            const availableChapters = useMemo(() => [...new Set(quizzes.map(q => q.ch))].sort((a,b) => a-b), [quizzes]);

            const filteredData = useMemo(() => {
                return quizzes.filter(q => {
                    const yearMatch = filters.years.length === 0 || filters.years.includes(q.year);
                    const chMatch = filters.ch === "전체" || q.ch === filters.ch;
                    return yearMatch && chMatch;
                }).slice(0, filters.count === 0 ? undefined : filters.count);
            }, [filters, quizzes]);

            const submitExam = () => {
                const score = filteredData.filter(q => userAnswers[q.id] === q.correct).length;
                const record = { date: new Date().toLocaleString(), score, total: filteredData.length };
                const newHistory = [...history, record];
                setHistory(newHistory);
                localStorage.setItem("quiz_history", JSON.stringify(newHistory));
                setSubmitted(true);
            };

            const resetQuiz = () => {
                setSubmitted(false);
                setUserAnswers({});
            };

            return e("div", {className: "max-w-3xl mx-auto p-4 space-y-6"},
                e("div", {className: "bg-white p-6 rounded-2xl shadow-sm border space-y-4"},
                    e("h1", {className: "text-xl font-bold"}, "항공기정비기능사 기출 시스템"),
                    e("div", {className: "flex gap-2"},
                        e("button", {onClick: () => {setMode("연습"); resetQuiz();}, className: `flex-1 p-2 rounded ${mode === "연습" ? "bg-blue-600 text-white" : "bg-slate-200"}`}, "연습 모드"),
                        e("button", {onClick: () => {setMode("시험"); resetQuiz();}, className: `flex-1 p-2 rounded ${mode === "시험" ? "bg-emerald-600 text-white" : "bg-slate-200"}`}, "시험 모드")
                    ),
                    e("div", {className: "flex flex-wrap gap-2"},
                        availableYears.map(y => e("button", {key: y, onClick: () => setFilters(f => ({...f, years: f.years.includes(y) ? f.years.filter(i=>i!==y) : [...f.years, y]})), className: `px-3 py-1 rounded text-sm ${filters.years.includes(y) ? "bg-blue-600 text-white" : "bg-slate-200"}`}, y))
                    ),
                    e("div", {className: "flex gap-2"},
                        e("select", {onChange: (ev) => setFilters(f => ({...f, ch: ev.target.value})), className: "border p-2 rounded flex-1"},
                            e("option", {value: "전체"}, "모든 챕터"),
                            ...availableChapters.map(c => e("option", {key: c, value: c}, c + "장"))
                        ),
                        e("select", {onChange: (ev) => setFilters(f => ({...f, count: parseInt(ev.target.value)})), className: "border p-2 rounded flex-1"},
                            [5, 10, 20, 30].map(c => e("option", {key: c, value: c}, c + "문항"))
                        )
                    )
                ),
                filteredData.map((q, idx) => 
                    e("div", {key: q.id, className: "bg-white p-6 rounded-2xl shadow-sm border"},
                        e("h2", {className: "font-bold"}, (idx + 1) + ". " + q.q),
                        q.imgUrl ? e("img", {src: q.imgUrl, className: "my-2 max-h-48"}) : null,
                        e("div", {className: "grid gap-2 mt-4"},
                            q.options.map((opt, i) => {
                                let style = "";
                                if (mode === "연습" && userAnswers[q.id] === i) style = "bg-blue-200";
                                if (submitted) style = (i === q.correct ? "bg-green-300" : (userAnswers[q.id] === i ? "bg-red-300" : ""));
                                return e("button", {key: i, onClick: () => !submitted && setUserAnswers(prev => ({...prev, [q.id]: i})), className: `p-2 border rounded text-left ${style}`}, opt);
                            })
                        ),
                        (submitted || (mode === "연습" && userAnswers[q.id] !== undefined)) ? e("p", {className: "mt-2 text-sm text-gray-600"}, "해설: " + q.exp) : null
                    )
                ),
                mode === "시험" && !submitted && filteredData.length > 0 ? e("button", {onClick: submitExam, className: "w-full py-4 bg-blue-600 text-white rounded-xl"}, "제출 및 채점") : null,
                submitted ? e("div", {className: "bg-white p-6 rounded-2xl shadow-sm border"}, 
                    e("h3", {className: "font-bold mb-2"}, "최근 시험 기록"),
                    history.slice(-5).map((h, i) => e("p", {key: i}, `${h.date}: ${h.score}/${h.total}점`))
                ) : null
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(e(App));
    </script>
</body>
</html>
