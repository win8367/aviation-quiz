<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공마스터 Pro - 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX for Math Symbols -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compatibility Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .nav-drawer {
            position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transform: translateX(-100%); transition: transform 0.3s ease; z-index: 100; padding-top: 80px;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-item {
            width: 44px; height: 44px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 800; margin: 0 auto 10px auto;
            border: 2px solid #f1f5f9; cursor: pointer;
        }
        .nav-item.active { background: #4f46e5; color: white; border-color: transparent; }
        .nav-item.answered { border-color: #4f46e5; color: #4f46e5; }
        .nav-item.correct { background: #10b981; color: white; border-color: transparent; }
        .nav-item.wrong { background: #ef4444; color: white; border-color: transparent; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Firebase Initialization ---
        const firebaseConfig = JSON.parse(window.__firebase_config || '{}');
        const appId = window.__app_id || 'aviation-master-pro';
        
        let db, auth;
        if (firebaseConfig.apiKey) {
            const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
            db = firebase.firestore();
            auth = firebase.auth();
        }

        // --- Math Rendering Component ---
        const MathText = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    renderMathInElement(containerRef.current, {
                        delimiters: [
                            { left: "$$", right: "$$", display: true },
                            { left: "$", right: "$", display: false },
                            { left: "\\(", right: "\\)", display: false },
                            { left: "\\[", right: "\\]", display: true }
                        ],
                        throwOnError: false
                    });
                }
            }, [text]);
            return <div ref={containerRef} className="whitespace-pre-wrap leading-relaxed">{text || ""}</div>;
        };

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [questions, setQuestions] = useState([]);
            const [students, setStudents] = useState([]);
            const [results, setResults] = useState([]);
            const [examStatus, setExamStatus] = useState({ active: false, title: "정기 시험" });
            const [studentProfile, setStudentProfile] = useState(null);

            // Updated default limit to 10
            const [filters, setFilters] = useState({ year: '전체', session: '전체', category: '전체', limit: '10', mode: 'PRACTICE' });
            const [quizList, setQuizList] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isReview, setIsReview] = useState(false);
            const [isNavOpen, setIsNavOpen] = useState(false);

            // 1. Auth Lifecycle
            useEffect(() => {
                const initAuth = async () => {
                    if (!auth) { setLoading(false); return; }
                    try {
                        if (window.__initial_auth_token) {
                            await auth.signInWithCustomToken(window.__initial_auth_token);
                        } else if (!auth.currentUser) {
                            await auth.signInAnonymously();
                        }
                    } catch (e) {
                        console.error("Auth error:", e);
                    }
                };
                
                initAuth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (u) {
                        setUser(u);
                        setLoading(false);
                    }
                });
                return () => unsubscribe();
            }, []);

            // 2. Data Lifecycle
            useEffect(() => {
                if (!user || !db) return;

                const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

                const unsubQuestions = publicDataRef.collection('questions').onSnapshot(
                    s => setQuestions(s.docs.map(d => ({id: d.id, ...d.data()}))),
                    err => console.error("Questions error:", err)
                );
                
                const unsubResults = publicDataRef.collection('results').onSnapshot(
                    s => setResults(s.docs.map(d => ({id: d.id, ...d.data()}))),
                    err => console.error("Results error:", err)
                );

                const unsubStudents = publicDataRef.collection('students').onSnapshot(
                    s => setStudents(s.docs.map(d => ({id: d.id, ...d.data()}))),
                    err => console.error("Students error:", err)
                );

                const unsubConfig = publicDataRef.collection('configs').doc('main').onSnapshot(
                    doc => {
                        if(doc.exists) setExamStatus(doc.data().exam || { active: false, title: "정기 시험" });
                    },
                    err => console.error("Config error:", err)
                );

                return () => { 
                    unsubQuestions(); 
                    unsubResults(); 
                    unsubStudents();
                    unsubConfig(); 
                };
            }, [user]);

            const handleLogin = (name, sid) => {
                if (!name || !sid) return alert("정보를 입력해주세요.");
                
                if (students.length > 0) {
                    const found = students.find(s => s.name === name && String(s.studentId) === String(sid));
                    if (!found) return alert("등록되지 않은 학생 정보입니다.");
                }
                
                setStudentProfile({ name, studentId: sid });
                setView('HOME');
            };

            const startQuiz = () => {
                if (filters.mode === 'EXAM' && !examStatus.active) {
                    return alert("현재 시험 모드가 비활성화되어 있습니다.");
                }

                let pool = questions.filter(q => 
                    (filters.year === '전체' || String(q.year) === filters.year) &&
                    (filters.session === '전체' || q.session === filters.session) &&
                    (filters.category === '전체' || q.category === filters.category)
                );
                
                if (pool.length === 0) return alert("해당 조건의 문제가 없습니다.");
                
                pool = [...pool].sort(() => Math.random() - 0.5);
                if (filters.limit !== '전체') pool = pool.slice(0, parseInt(filters.limit));

                setQuizList(pool);
                setAnswers({});
                setCurrentIdx(0);
                setIsReview(false);
                setIsNavOpen(false);
                setView('QUIZ');
            };

            const submitQuiz = async () => {
                const correctCount = quizList.reduce((acc, q, idx) => acc + (answers[idx] === q.correct ? 1 : 0), 0);
                const score = Math.round((correctCount / quizList.length) * 100);
                
                if (db && user && studentProfile) {
                    try {
                        await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').add({
                            name: studentProfile.name,
                            studentId: studentProfile.studentId,
                            score,
                            correct: correctCount,
                            total: quizList.length,
                            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                            mode: filters.mode,
                            uid: user.uid
                        });
                        setView('RESULT');
                    } catch (e) {
                        alert("성적 저장 실패");
                    }
                }
            };

            const exportToCSV = (data, filename) => {
                if (!data.length) return;
                const headers = Object.keys(data[0]).join(",");
                const rows = data.map(row => 
                    Object.values(row).map(val => 
                        val instanceof firebase.firestore.Timestamp ? val.toDate().toLocaleString() : `"${val}"`
                    ).join(",")
                );
                const csvContent = "\uFEFF" + [headers, ...rows].join("\n");
                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = filename;
                link.click();
            };

            const handleStudentCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    const text = evt.target.result;
                    const lines = text.split('\n').filter(l => l.trim());
                    const batch = db.batch();
                    const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');

                    lines.forEach((line, idx) => {
                        if (idx === 0 && line.toLowerCase().includes('name')) return; 
                        const [name, studentId] = line.split(',').map(s => s.trim());
                        if (name && studentId) {
                            const ref = publicDataRef.collection('students').doc(studentId);
                            batch.set(ref, { name, studentId });
                        }
                    });

                    await batch.commit();
                    alert("학생 명단이 업로드되었습니다.");
                };
                reader.readAsText(file);
            };

            const uploadQuestionsJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        const batch = db.batch();
                        const publicDataRef = db.collection('artifacts').doc(appId).collection('public').doc('data');
                        data.forEach((q, index) => {
                            const ref = publicDataRef.collection('questions').doc(q.id || `q_${Date.now()}_${index}`);
                            batch.set(ref, q);
                        });
                        await batch.commit();
                        alert("문제 데이터가 업로드되었습니다.");
                    } catch (err) { alert("JSON 파싱 오류"); }
                };
                reader.readAsText(file);
            };

            const toggleExamMode = async () => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('configs').doc('main').set({
                    exam: { active: !examStatus.active, title: examStatus.title }
                }, { merge: true });
            };

            const report = useMemo(() => {
                if (view !== 'RESULT' || quizList.length === 0) return null;
                const correctCount = quizList.reduce((acc, q, idx) => acc + (answers[idx] === q.correct ? 1 : 0), 0);
                const score = Math.round((correctCount / quizList.length) * 100);
                return { score };
            }, [view, quizList, answers]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-indigo-400">
                    <div className="w-12 h-12 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div className="font-black animate-pulse tracking-widest uppercase">Aero Master...</div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen flex flex-col bg-slate-50 relative shadow-xl overflow-hidden border-x border-slate-200">
                    
                    <div className={`nav-drawer ${isNavOpen ? 'open' : ''} overflow-y-auto custom-scroll`}>
                        {quizList.map((_, i) => (
                            <div key={i} onClick={() => { setCurrentIdx(i); setIsNavOpen(false); }} 
                                className={`nav-item ${currentIdx === i ? 'active' : ''} ${isReview || (filters.mode === 'PRACTICE' && answers[i] !== undefined) ? (answers[i] === quizList[i].correct ? 'correct' : 'wrong') : (answers[i] !== undefined ? 'answered' : '')}`}>
                                {i + 1}
                            </div>
                        ))}
                    </div>

                    <header className="p-4 glass sticky top-0 z-50 flex justify-between items-center">
                        <div className="cursor-pointer" onClick={() => setView('HOME')}>
                            <span className="text-xl font-black text-indigo-600 italic tracking-tighter">AERO MASTER</span>
                        </div>
                        <div className="flex gap-2">
                            {view === 'QUIZ' && <button onClick={() => setIsNavOpen(!isNavOpen)} className="px-3 py-1.5 bg-indigo-600 text-white rounded-lg font-black text-[10px]">번호판</button>}
                            <button onClick={() => setView('ADMIN')} className="p-2 bg-slate-100 rounded-lg text-slate-500 hover:bg-slate-200 transition-colors">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto custom-scroll">
                        {view === 'LOGIN' && (
                            <div className="h-full flex flex-col items-center justify-center py-10 animate-in fade-in">
                                <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mb-6 shadow-lg rotate-3 text-white">
                                    <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                                </div>
                                <h2 className="text-2xl font-black text-slate-800 mb-2 tracking-tighter">학생 인증</h2>
                                <p className="text-[10px] text-slate-400 font-bold mb-8">등록된 이름과 학번을 입력하세요.</p>
                                <div className="w-full space-y-3 mb-8">
                                    <input id="l-name" type="text" placeholder="성함" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold outline-none focus:ring-2 ring-indigo-100" />
                                    <input id="l-id" type="text" placeholder="학번" className="w-full p-4 bg-white border border-slate-200 rounded-xl font-bold outline-none focus:ring-2 ring-indigo-100" />
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('l-name').value, document.getElementById('l-id').value)} className="w-full py-4 bg-slate-900 text-white rounded-xl font-bold shadow-xl active:scale-95 transition-all">시스템 접속</button>
                            </div>
                        )}

                        {view === 'HOME' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-4">
                                <div className="p-6 bg-white rounded-2xl border border-slate-100 shadow-sm">
                                    <h3 className="text-xs font-black text-slate-400 mb-4 uppercase tracking-widest">환경 설정</h3>
                                    <div className="space-y-5">
                                        <div className="grid grid-cols-2 gap-2">
                                            <button onClick={() => setFilters({...filters, mode: 'PRACTICE'})} className={`py-3 rounded-xl font-black text-xs border-2 transition-all ${filters.mode === 'PRACTICE' ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-slate-50 text-slate-400'}`}>연습 모드</button>
                                            <button onClick={() => setFilters({...filters, mode: 'EXAM'})} className={`py-3 rounded-xl font-black text-xs border-2 transition-all ${filters.mode === 'EXAM' ? 'border-slate-900 bg-slate-900 text-white' : 'border-slate-50 text-slate-400'}`}>시험 모드</button>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            <select value={filters.year} onChange={e => setFilters({...filters, year: e.target.value})} className="p-3 bg-slate-50 rounded-xl font-bold text-xs outline-none">
                                                <option value="전체">전체 연도</option>
                                                {[...new Set(questions.map(q => String(q.year)))].sort().reverse().map(y => <option key={y} value={y}>{y}년</option>)}
                                            </select>
                                            <select value={filters.session} onChange={e => setFilters({...filters, session: e.target.value})} className="p-3 bg-slate-50 rounded-xl font-bold text-xs outline-none">
                                                <option value="전체">전체 회차</option>
                                                {[...new Set(questions.map(q => q.session))].sort().map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        </div>
                                        <select value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-bold text-xs outline-none">
                                            <option value="전체">전체 과목</option>
                                            {[...new Set(questions.map(q => q.category))].sort().map(c => <option key={c} value={c}>{c}</option>)}
                                        </select>
                                        
                                        {/* Updated Limit Selection to include 5, 10, 20, 30, 60, 전체 */}
                                        <div className="flex flex-col gap-2">
                                            <label className="text-[10px] font-black text-slate-400 uppercase ml-1">문항 수 선택</label>
                                            <div className="grid grid-cols-3 gap-2">
                                                {['5', '10', '20', '30', '60', '전체'].map(num => (
                                                    <button 
                                                        key={num}
                                                        onClick={() => setFilters({...filters, limit: num})}
                                                        className={`py-2 rounded-lg text-[11px] font-bold transition-all border ${filters.limit === num ? 'bg-indigo-600 border-indigo-600 text-white shadow-md' : 'bg-white border-slate-100 text-slate-500'}`}
                                                    >
                                                        {num === '전체' ? num : `${num}문항`}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>

                                        <button onClick={startQuiz} className="w-full py-4 bg-indigo-600 text-white rounded-xl font-black text-sm shadow-lg active:scale-95 transition-all">풀이 시작</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'QUIZ' && quizList[currentIdx] && (
                            <div className="animate-in fade-in pb-20">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex gap-2">
                                        <span className="px-2.5 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[9px] font-black">{quizList[currentIdx].year}년</span>
                                        <span className="px-2.5 py-1 bg-indigo-600 text-white rounded-lg text-[9px] font-black">{quizList[currentIdx].category}</span>
                                    </div>
                                    <span className="text-lg font-black text-slate-800">{currentIdx + 1}<span className="text-slate-300 text-xs ml-1">/ {quizList.length}</span></span>
                                </div>
                                <div className="bg-white p-6 rounded-2xl border border-slate-100 shadow-sm mb-6 font-bold text-slate-800 text-lg leading-relaxed">
                                    <MathText text={quizList[currentIdx].q} />
                                </div>
                                <div className="space-y-2.5">
                                    {quizList[currentIdx].options.map((opt, i) => {
                                        const selected = answers[currentIdx] === i;
                                        const correct = quizList[currentIdx].correct === i;
                                        const done = filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined;
                                        let style = "border-slate-100 bg-white";
                                        if (selected) style = "border-indigo-500 bg-indigo-50 text-indigo-700 ring-2 ring-indigo-100";
                                        if (isReview || done) {
                                            if (correct) style = "border-emerald-500 bg-emerald-50 text-emerald-700 ring-2 ring-emerald-100";
                                            else if (selected) style = "border-rose-500 bg-rose-50 text-rose-700 ring-2 ring-rose-100";
                                        }
                                        return (
                                            <button key={i} disabled={isReview || done} onClick={() => setAnswers({...answers, [currentIdx]: i})} className={`w-full p-4 text-left border-2 rounded-xl flex gap-3 transition-all ${style}`}>
                                                <span className={`w-6 h-6 rounded flex items-center justify-center shrink-0 text-[10px] font-black ${selected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>
                                                <div className="text-[13px] font-semibold"><MathText text={opt} /></div>
                                            </button>
                                        );
                                    })}
                                </div>
                                {(isReview || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined)) && (
                                    <div className="mt-8 p-5 bg-slate-900 rounded-2xl text-white text-[11px] border-l-4 border-indigo-400">
                                        <div className="font-black text-indigo-400 mb-2 tracking-widest uppercase">Expert Explanation</div>
                                        <MathText text={quizList[currentIdx].exp || "해설이 없습니다."} />
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'RESULT' && report && (
                            <div className="text-center py-10 bg-white rounded-[2rem] shadow-xl border border-slate-100 mt-10">
                                <p className="text-[9px] font-black text-slate-300 uppercase mb-1">최종 점수</p>
                                <h2 className="text-6xl font-black text-slate-900 mb-4 tracking-tighter">{report.score}<span className="text-xl text-slate-200 ml-1 font-normal">점</span></h2>
                                <button onClick={() => setView('HOME')} className="mt-8 w-1/2 py-4 bg-indigo-600 text-white rounded-xl font-black text-xs shadow-lg">홈으로</button>
                            </div>
                        )}

                        {view === 'ADMIN' && (
                            <div className="space-y-6 animate-in fade-in pb-20">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-black text-slate-800 text-xl tracking-tighter">관리 도구</h3>
                                    <button onClick={toggleExamMode} className={`px-4 py-2 rounded-xl text-[10px] font-black ${examStatus.active ? 'bg-rose-500 text-white' : 'bg-slate-200 text-slate-600'}`}>
                                        {examStatus.active ? '시험 종료' : '시험 시작'}
                                    </button>
                                </div>

                                <div className="grid grid-cols-2 gap-3">
                                    <div className="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center">
                                        <span className="text-[10px] font-black text-slate-400 uppercase mb-3">문제 (JSON)</span>
                                        <input type="file" id="json-q" accept=".json" onChange={uploadQuestionsJSON} className="hidden" />
                                        <label htmlFor="json-q" className="w-full py-3 bg-indigo-50 text-indigo-600 rounded-xl text-center text-[10px] font-bold cursor-pointer hover:bg-indigo-100 transition-all">파일 선택</label>
                                    </div>
                                    <div className="p-4 bg-white rounded-2xl border border-slate-100 shadow-sm flex flex-col items-center">
                                        <span className="text-[10px] font-black text-slate-400 uppercase mb-3">학생 (CSV)</span>
                                        <input type="file" id="csv-s" accept=".csv" onChange={handleStudentCSV} className="hidden" />
                                        <label htmlFor="csv-s" className="w-full py-3 bg-emerald-50 text-emerald-600 rounded-xl text-center text-[10px] font-bold cursor-pointer hover:bg-emerald-100 transition-all">파일 선택</label>
                                    </div>
                                </div>

                                <div className="p-5 bg-white rounded-2xl border border-slate-100 shadow-sm">
                                    <div className="flex justify-between items-center mb-4">
                                        <h4 className="text-[10px] font-black text-slate-400 uppercase tracking-widest">응시 기록 ({results.length})</h4>
                                        <button onClick={() => exportToCSV(results, `results_${Date.now()}.csv`)} className="px-3 py-1.5 bg-slate-900 text-white rounded-lg text-[9px] font-black">CSV 추출</button>
                                    </div>
                                    <div className="max-h-[300px] overflow-y-auto custom-scroll space-y-2">
                                        {results.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)).map((r, i) => (
                                            <div key={i} className="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                                                <div className="flex flex-col">
                                                    <span className="text-[11px] font-bold">{r.name} ({r.studentId})</span>
                                                    <span className="text-[8px] text-slate-400">{r.timestamp?.toDate() ? r.timestamp.toDate().toLocaleString() : 'Loading...'}</span>
                                                </div>
                                                <div className={`font-black text-sm ${r.score >= 60 ? 'text-emerald-500' : 'text-rose-500'}`}>{r.score}점</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {view === 'QUIZ' && (
                        <footer className="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 glass flex gap-3 z-40">
                            <button disabled={currentIdx === 0} onClick={() => setCurrentIdx(p => p - 1)} className="w-12 h-12 bg-slate-100 text-slate-500 rounded-xl flex items-center justify-center disabled:opacity-20">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <button onClick={() => { if (currentIdx < quizList.length - 1) { setCurrentIdx(p => p + 1); } else if(!isReview) { if (confirm("제출하시겠습니까?")) submitQuiz(); } }} className="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-black text-xs shadow-lg">
                                {currentIdx === quizList.length - 1 ? (isReview ? '종료' : '제출하기') : '다음 문제'}
                            </button>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
