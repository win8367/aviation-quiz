<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공기정비기능사 2025 합격 마스터</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- PapaParse for CSV parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            const [questions, setQuestions] = useState([]);
            const [loading, setLoading] = useState(true);
            const [view, setView] = useState('HOME'); // HOME, QUIZ, RESULT
            const [filters, setFilters] = useState({
                category: '전체',
                ch: '전체',
                imp: '전체',
                subcat: '전체',
                onlyImg: false,
                limit: 20
            });
            const [quizList, setQuizList] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [userAnswers, setUserAnswers] = useState({});
            const [score, setScore] = useState(0);

            // 데이터 로드
            useEffect(() => {
                const fetchData = async () => {
                    try {
                        const response = await fetch('항공기정비기능사(25년추가,그림포함)정리.csv');
                        const reader = response.body.getReader();
                        const result = await reader.read();
                        const decoder = new TextDecoder('utf-8');
                        const csv = decoder.decode(result.value);
                        
                        Papa.parse(csv, {
                            header: true,
                            skipEmptyLines: true,
                            complete: (results) => {
                                setQuestions(results.data);
                                setLoading(false);
                            },
                            error: (err) => {
                                console.error("CSV 파싱 에러:", err);
                                setLoading(false);
                            }
                        });
                    } catch (error) {
                        console.error("파일 로드 에러:", error);
                        setLoading(false);
                    }
                };
                fetchData();
            }, []);

            // 필터 옵션 추출
            const options = useMemo(() => {
                if (questions.length === 0) return { categories: [], chapters: [], imps: [], subcats: [] };
                return {
                    categories: ['전체', ...new Set(questions.map(q => q.category).filter(Boolean))],
                    chapters: ['전체', ...new Set(questions.map(q => String(q.ch)).filter(ch => ch && ch !== 'undefined'))].sort((a, b) => a - b),
                    imps: ['전체', ...new Set(questions.map(q => q.imp).filter(Boolean))],
                    subcats: ['전체', ...new Set(questions.map(q => q.subcat).filter(Boolean))]
                };
            }, [questions]);

            // 퀴즈 시작 로직
            const startQuiz = () => {
                let pool = questions.filter(q => {
                    const matchCategory = filters.category === '전체' || q.category === filters.category;
                    const matchCh = filters.ch === '전체' || String(q.ch) === filters.ch;
                    const matchSubcat = filters.subcat === '전체' || q.subcat === filters.subcat;
                    const matchImp = filters.imp === '전체' || q.imp === filters.imp;
                    const matchImg = filters.onlyImg ? (q.imgUrl && q.imgUrl.trim() !== "" && q.imgUrl !== "NaN") : true;
                    return matchCategory && matchCh && matchSubcat && matchImp && matchImg;
                });

                if (pool.length === 0) {
                    alert("해당 조건의 문제가 없습니다. 필터를 조정해주세요.");
                    return;
                }

                // 무작위 섞기 및 개수 제한
                const shuffled = [...pool].sort(() => Math.random() - 0.5).slice(0, filters.limit);
                setQuizList(shuffled);
                setCurrentIdx(0);
                setUserAnswers({});
                setView('QUIZ');
            };

            const handleAnswer = (answerIdx) => {
                setUserAnswers({ ...userAnswers, [currentIdx]: answerIdx });
            };

            const submitQuiz = () => {
                let correctCount = 0;
                quizList.forEach((q, idx) => {
                    if (String(userAnswers[idx]) === String(q.correct)) {
                        correctCount++;
                    }
                });
                setScore(correctCount);
                setView('RESULT');
            };

            if (loading) return (
                <div className="flex h-screen items-center justify-center bg-slate-50">
                    <div className="text-center">
                        <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                        <p className="font-bold text-slate-600">데이터를 불러오는 중...</p>
                    </div>
                </div>
            );

            return (
                <div className="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative flex flex-col">
                    {/* Header */}
                    <header className="p-6 border-b border-slate-100 flex justify-between items-center bg-white sticky top-0 z-10">
                        <h1 className="text-xl font-black text-slate-800 tracking-tight">AERO<span className="text-indigo-600">MASTER</span></h1>
                        <div className="px-3 py-1 bg-indigo-50 text-indigo-600 rounded-full text-xs font-bold uppercase tracking-widest">2025 Edition</div>
                    </header>

                    {view === 'HOME' && (
                        <main className="p-6 flex-1 custom-scroll overflow-y-auto pb-24">
                            <div className="mb-8">
                                <h2 className="text-2xl font-black text-slate-900 leading-tight">합격을 위한<br/>맞춤 학습 설정</h2>
                                <p className="text-slate-500 text-sm mt-2 font-medium">원하는 조건을 선택하여 집중 학습하세요.</p>
                            </div>

                            <div className="space-y-5">
                                {/* 과목 선택 */}
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">과목 구분</label>
                                    <div className="grid grid-cols-2 gap-2">
                                        {options.categories.map(cat => (
                                            <button 
                                                key={cat}
                                                onClick={() => setFilters({...filters, category: cat})}
                                                className={`py-3 px-4 rounded-2xl text-sm font-bold transition-all border ${filters.category === cat ? 'bg-indigo-600 text-white border-indigo-600 shadow-lg shadow-indigo-100' : 'bg-slate-50 text-slate-600 border-slate-100'}`}
                                            >
                                                {cat}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* 챕터 & 중요도 */}
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">챕터(CH)</label>
                                        <select 
                                            value={filters.ch} 
                                            onChange={e => setFilters({...filters, ch: e.target.value})}
                                            className="w-full p-3 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500"
                                        >
                                            {options.chapters.map(ch => <option key={ch} value={ch}>{ch === '전체' ? '전체 챕터' : `${ch}장`}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">중요도(IMP)</label>
                                        <select 
                                            value={filters.imp} 
                                            onChange={e => setFilters({...filters, imp: e.target.value})}
                                            className="w-full p-3 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500"
                                        >
                                            {options.imps.map(imp => <option key={imp} value={imp}>{imp === '전체' ? '전체 등급' : imp}</option>)}
                                        </select>
                                    </div>
                                </div>

                                {/* 세부 카테고리 */}
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">세부 항목(SUBCAT)</label>
                                    <select 
                                        value={filters.subcat} 
                                        onChange={e => setFilters({...filters, subcat: e.target.value})}
                                        className="w-full p-3 bg-slate-50 rounded-2xl border border-slate-100 text-sm font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500"
                                    >
                                        {options.subcats.map(sub => <option key={sub} value={sub}>{sub}</option>)}
                                    </select>
                                </div>

                                {/* 이미지 전용 & 문항수 */}
                                <div className="flex items-center justify-between p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                                    <div className="flex items-center gap-3">
                                        <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-xl shadow-sm">🖼️</div>
                                        <div>
                                            <p className="text-sm font-black text-indigo-900">그림 문제만 풀기</p>
                                            <p className="text-[10px] text-indigo-400 font-bold">이미지가 포함된 문항만 추출</p>
                                        </div>
                                    </div>
                                    <input 
                                        type="checkbox" 
                                        checked={filters.onlyImg} 
                                        onChange={e => setFilters({...filters, onlyImg: e.target.checked})}
                                        className="w-6 h-6 accent-indigo-600 rounded-lg"
                                    />
                                </div>

                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">문항 수 설정</label>
                                    <div className="flex gap-2">
                                        {[10, 20, 40, 60].map(n => (
                                            <button 
                                                key={n}
                                                onClick={() => setFilters({...filters, limit: n})}
                                                className={`flex-1 py-2 rounded-xl text-xs font-black transition-all ${filters.limit === n ? 'bg-slate-800 text-white shadow-md' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}
                                            >
                                                {n}문항
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </main>
                    )}

                    {view === 'HOME' && (
                        <footer className="p-6 bg-white border-t border-slate-100 absolute bottom-0 w-full">
                            <button 
                                onClick={startQuiz}
                                className="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-[0.98] transition-all"
                            >
                                학습 시작하기
                            </button>
                        </footer>
                    )}

                    {view === 'QUIZ' && quizList.length > 0 && (
                        <div className="flex-1 flex flex-col p-6 overflow-y-auto pb-24">
                            <div className="flex justify-between items-center mb-6">
                                <span className="text-xs font-black text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase tracking-tighter">
                                    Question {currentIdx + 1} / {quizList.length}
                                </span>
                                <button onClick={() => setView('HOME')} className="text-xs font-bold text-slate-400 hover:text-red-500">중단하기</button>
                            </div>

                            <div className="mb-6">
                                <h3 className="text-lg font-bold text-slate-800 leading-relaxed mb-4">
                                    {quizList[currentIdx].q}
                                </h3>
                                
                                {quizList[currentIdx].imgUrl && quizList[currentIdx].imgUrl !== "NaN" && (
                                    <div className="w-full rounded-2xl overflow-hidden border border-slate-100 mb-4 bg-slate-50">
                                        <img src={quizList[currentIdx].imgUrl} alt="문제 이미지" className="max-w-full mx-auto" />
                                    </div>
                                )}
                            </div>

                            <div className="space-y-3">
                                {[1, 2, 3, 4].map(num => {
                                    const optionKey = `options__00${num}`;
                                    return (
                                        <button
                                            key={num}
                                            onClick={() => handleAnswer(num)}
                                            className={`w-full p-4 rounded-2xl text-left border-2 transition-all flex items-center gap-4 ${userAnswers[currentIdx] === num ? 'border-indigo-600 bg-indigo-50 shadow-md' : 'border-slate-50 bg-slate-50 text-slate-600 hover:border-slate-200'}`}
                                        >
                                            <span className={`w-8 h-8 rounded-xl flex items-center justify-center font-black text-sm ${userAnswers[currentIdx] === num ? 'bg-indigo-600 text-white' : 'bg-white border border-slate-100 text-slate-400'}`}>
                                                {num}
                                            </span>
                                            <span className="font-bold text-sm flex-1">{quizList[currentIdx][optionKey]}</span>
                                        </button>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {view === 'QUIZ' && (
                        <footer className="p-6 border-t border-slate-100 flex gap-3 bg-white absolute bottom-0 w-full">
                            <button 
                                disabled={currentIdx === 0}
                                onClick={() => setCurrentIdx(p => p - 1)}
                                className="w-16 h-16 bg-slate-100 text-slate-400 rounded-3xl flex items-center justify-center hover:bg-slate-200 transition-all disabled:opacity-30"
                            >
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            {currentIdx < quizList.length - 1 ? (
                                <button 
                                    onClick={() => setCurrentIdx(p => p + 1)}
                                    className="flex-1 bg-slate-900 text-white rounded-3xl font-black text-lg hover:bg-black active:scale-95 transition-all"
                                >
                                    다음 문항
                                </button>
                            ) : (
                                <button 
                                    onClick={submitQuiz}
                                    className="flex-1 bg-indigo-600 text-white rounded-3xl font-black text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700 active:scale-95 transition-all"
                                >
                                    최종 제출하기
                                </button>
                            )}
                        </footer>
                    )}

                    {view === 'RESULT' && (
                        <main className="p-8 flex-1 flex flex-col items-center justify-center text-center overflow-y-auto">
                            <div className="mb-8 relative">
                                <div className="w-40 h-40 rounded-full border-8 border-indigo-50 flex items-center justify-center">
                                    <div>
                                        <span className="text-5xl font-black text-indigo-600">{Math.round((score/quizList.length)*100)}</span>
                                        <span className="text-slate-400 font-bold">점</span>
                                    </div>
                                </div>
                                <div className="absolute -bottom-2 -right-2 bg-slate-900 text-white px-4 py-2 rounded-2xl font-black text-sm">
                                    {score} / {quizList.length}
                                </div>
                            </div>
                            
                            <h2 className="text-2xl font-black text-slate-900 mb-2">
                                {score === quizList.length ? "완벽합니다! 합격권이에요! 🎉" : score >= quizList.length * 0.6 ? "안정적인 점수입니다! 👍" : "조금 더 노력이 필요해요! 💪"}
                            </h2>
                            <p className="text-slate-500 font-medium mb-10">틀린 문제를 다시 확인하여 부족한 부분을 채워보세요.</p>

                            <div className="w-full grid grid-cols-2 gap-4">
                                <button 
                                    onClick={() => setView('HOME')}
                                    className="p-4 bg-slate-100 text-slate-600 rounded-2xl font-black text-lg hover:bg-slate-200 transition-all"
                                >
                                    홈으로
                                </button>
                                <button 
                                    onClick={startQuiz}
                                    className="p-4 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-lg shadow-indigo-100 hover:bg-indigo-700 transition-all"
                                >
                                    다시 풀기
                                </button>
                            </div>
                        </main>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
