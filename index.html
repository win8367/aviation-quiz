<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>항공기정비기능사 Pro - 점수 저장 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        var { useState, useMemo, useEffect } = React;

        var QUIZ_DATA = [
            { no: "477", id: "q0034", year: "2015", session: "1회", category: "기체 정비", ch: "4", q: "측정기기 아메스/칼마형은?", options: ["실린더 게이지", "두께 게이지", "버니어 캘리퍼스", "텔레스코핑 게이지"], correct: 0, exp: "실린더 게이지에 대한 설명입니다.", imgUrl: "https://raw.githubusercontent.com/win8367/aviation-images/refs/heads/main/image11.svg", eurl: "https://raw.githubusercontent.com/win8367/aviation-images/refs/heads/main/image109.svg" },
            { no: "478", id: "q0035", year: "2016", session: "1회", category: "항공역학", ch: "1", q: "양력의 발생 원리는?", options: ["베르누이", "뉴턴", "파스칼", "보일"], correct: 0, exp: "베르누이 정리에 의한 양력 설명입니다.", imgUrl: "", eurl: "" }
        ];

        function App() {
            var [mode, setMode] = useState("연습");
            var [filters, setFilters] = useState({ years: [], ch: "전체", count: 5, onlyImg: false });
            var [userAnswers, setUserAnswers] = useState({});
            var [submitted, setSubmitted] = useState(false);
            var [history, setHistory] = useState([]);

            useEffect(() => {
                var saved = localStorage.getItem("quiz_history");
                if (saved) setHistory(JSON.parse(saved));
            }, []);

            var filteredData = useMemo(() => {
                let data = QUIZ_DATA.filter(q => 
                    (filters.years.length === 0 || filters.years.includes(q.year)) &&
                    (filters.ch === "전체" || q.ch === filters.ch) &&
                    (!filters.onlyImg || q.imgUrl)
                );
                return data.slice(0, filters.count);
            }, [filters]);

            var calculateScore = () => {
                let correct = 0;
                filteredData.forEach(q => { if(userAnswers[q.id] === q.correct) correct++; });
                return correct;
            };

            var handleSubmit = () => {
                var finalScore = calculateScore();
                var record = { date: new Date().toLocaleString(), score: finalScore, total: filteredData.length };
                var newHistory = [...history, record];
                setHistory(newHistory);
                localStorage.setItem("quiz_history", JSON.stringify(newHistory));
                setSubmitted(true);
            };

            return (
                <div className="max-w-3xl mx-auto p-4 space-y-6">
                    <div className="bg-white p-6 rounded-2xl shadow-sm border space-y-4">
                        <h1 className="text-xl font-black">학습 설정 및 점수 관리</h1>
                        <button onClick={() => {setMode(mode === "연습" ? "시험" : "연습"); setSubmitted(false); setUserAnswers({});}} className="bg-emerald-600 text-white px-4 py-2 rounded">현재 모드: {mode}</button>
                        <div className="text-sm">최근 기록: {history.length > 0 ? history[history.length-1].score + "/" + history[history.length-1].total + "점" : "기록 없음"}</div>
                    </div>

                    {filteredData.map((q, idx) => (
                        <div key={q.id} className="bg-white p-6 rounded-2xl shadow-sm border">
                            <h2 className="font-bold">{idx + 1}. {q.q}</h2>
                            {q.imgUrl && <img src={q.imgUrl} className="my-2 max-h-48" alt="문제" />}
                            <div className="grid gap-2 mt-4">
                                {q.options.map((opt, i) => (
                                    <button key={i} onClick={() => !submitted && setUserAnswers({...userAnswers, [q.id]: i})} className={`p-2 border rounded ${userAnswers[q.id] === i ? "bg-blue-200" : ""}`}>
                                        {opt}
                                    </button>
                                ))}
                            </div>
                            {(mode === "연습" || submitted) && (
                                <div className="mt-4 p-4 bg-emerald-50 rounded-lg">
                                    <p>해설: {q.exp}</p>
                                    {q.eurl && <img src={q.eurl} className="mt-2 max-h-48" alt="해설" />}
                                </div>
                            )}
                        </div>
                    ))}

                    {mode === "시험" && !submitted && <button onClick={handleSubmit} className="w-full py-4 bg-blue-600 text-white rounded-xl">제출하기</button>}
                    {submitted && <div className="text-2xl font-bold text-center">최종 점수: {calculateScore()} / {filteredData.length}</div>}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
