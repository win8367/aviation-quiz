<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공기정비기능사 Pro - 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    // JSX 내부의 { } 부분 바로 앞에 추가해서 확인
console.log("렌더링 데이터 타입 확인:", typeof 변수명);
if (typeof 변수명 === 'object') {
    console.log("객체 내용 상세:", JSON.stringify(변수명));
}
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .nav-drawer {
            position: fixed; left: 0; top: 0; bottom: 0; width: 70px;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transform: translateX(-100%); transition: transform 0.3s ease; z-index: 1000; padding-top: 80px;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-item {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; margin: 0 auto 10px auto;
            border: 2px solid #f1f5f9; cursor: pointer; transition: all 0.2s;
        }
        .nav-item.active { border-color: #4f46e5; background: #4f46e5; color: white; }
        .nav-item.answered { background: #f1f5f9; color: #64748b; }
        .nav-item.correct { background: #10b981; color: white; border-color: transparent; }
        .nav-item.wrong { background: #ef4444; color: white; border-color: transparent; }
        .fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

   <script type="text/babel" data-type="module">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCoSlnAX9Hqh85IBtJuGqLrJdpxRbFgwnc",
            authDomain: "airtest-422fe.firebaseapp.com",
            projectId: "airtest-422fe",
            storageBucket: "airtest-422fe.firebasestorage.app",
            messagingSenderId: "203408450908",
            appId: "1:203408450908:web:1be58ef1b4b4f4b3f5cd99",
            measurementId: "G-PC36TY5R3M"
        };

        const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
        const auth = firebase.auth();
        const db = firebase.firestore();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'aviation-master-pro';

        const MathText = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    try {
                        renderMathInElement(containerRef.current, {
                            delimiters: [
                                { left: "$$", right: "$$", display: true },
                                { left: "$", right: "$", display: false }
                            ],
                            throwOnError: false
                        });
                    } catch (e) {}
                }
            }, [text]);
// 컴포넌트 내부 return 직전에 추가
console.log("렌더링 데이터 확인:", { quizList, currentIdx, /* 다른 상태들 */ });
            return <div ref={containerRef} className="whitespace-pre-wrap leading-relaxed">{text || ""}</div>;
        };

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [studentProfile, setStudentProfile] = useState(null);
            
            const [questions, setQuestions] = useState([]);
            const [students, setStudents] = useState([]);
            const [results, setResults] = useState([]);
            const [examConfig, setExamConfig] = useState({ forceExam: false });
            
            const [quizList, setQuizList] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isReviewMode, setIsReviewMode] = useState(false);
            const [isNavOpen, setIsNavOpen] = useState(false);
            
            const [filters, setFilters] = useState({ 
                years: [], session: '전체', category: '전체', limit: '10', mode: 'PRACTICE',
                ch: '전체', subcat: '전체', imp: '전체', onlyImg: false
            });

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (!u) auth.signInAnonymously().catch(e => console.error("Auth error:", e));
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const publicPath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubQ = publicPath.collection('questions').onSnapshot(s => setQuestions(s.docs.map(d => ({id: d.id, ...d.data()}))), e => console.error(e));
                const unsubS = publicPath.collection('students').onSnapshot(s => setStudents(s.docs.map(d => ({id: d.id, ...d.data()}))), e => console.error(e));
                const unsubR = publicPath.collection('results').onSnapshot(s => setResults(s.docs.map(d => ({id: d.id, ...d.data()}))), e => console.error(e));
                const unsubC = publicPath.collection('configs').doc('main').onSnapshot(doc => { 
                    if(doc.exists) setExamConfig(doc.data()); 
                }, e => console.error(e));

                return () => { unsubQ(); unsubS(); unsubR(); unsubC(); };
            }, [user]);

            useEffect(() => {
                if (examConfig.forceExam && filters.mode === 'PRACTICE') {
                    setFilters(prev => ({...prev, mode: 'EXAM'}));
                }
            }, [examConfig]);

            const handleAdminAccess = () => {
                const pw = prompt("관리자 암호를 입력하세요.");
                if (pw === "111") setView('ADMIN');
                else if (pw !== null) alert("암호가 틀렸습니다.");
            };

            const startQuiz = () => {
                let pool = questions.filter(q => {
                    const matchYear = filters.years.length === 0 || filters.years.includes(String(q.year));
                    const matchCategory = filters.category === '전체' || q.category === filters.category;
                    const matchCh = filters.ch === '전체' || String(q.ch) === filters.ch;
                    const matchSubcat = filters.subcat === '전체' || q.subcat === filters.subcat;
                    const matchImp = filters.imp === '전체' || q.imp === filters.imp;
                    const matchImg = filters.onlyImg ? (q.imgUrl && q.imgUrl.trim() !== "") : true;
                    const matchSession = filters.session === '전체' || String(q.session) === filters.session;

                    return matchYear && matchCategory && matchCh && matchSubcat && matchImp && matchImg && matchSession;
                });
                
                if (pool.length === 0) return alert("해당 조건의 문제가 없습니다.");
                pool = [...pool].sort(() => Math.random() - 0.5);
                if (filters.limit !== '전체') pool = pool.slice(0, parseInt(filters.limit));
                
                setQuizList(pool);
                setAnswers({});
                setCurrentIdx(0);
                setIsReviewMode(false);
                setView('QUIZ');
            };

            const calculateCategoryStats = (qList, ansMap) => {
                const cats = [...new Set(qList.map(q => q.category))];
                return cats.map(c => {
                    const qItems = qList.filter(q => q.category === c);
                    const qIdxs = qList.map((q, idx) => q.category === c ? idx : -1).filter(i => i !== -1);
                    const cCorrect = qIdxs.reduce((acc, idx) => acc + (ansMap[idx] === qList[idx].correct ? 1 : 0), 0);
                    return { name: c, correct: cCorrect, total: qItems.length, percent: Math.round((cCorrect/qItems.length)*100) };
                });
            };

           const submitExam = async () => {
                // 1. 정답 및 오답 리스트 추출
                const correctList = [];
                const incorrectList = [];
                let score = 0;

                quizList.forEach((q, i) => {
                    // 정답 포맷 방어코드 적용 (1~4 기준일 때와 0~3 기준일 때 모두 호환)
                    const correctAns = Number(q.correct) > 3 ? Number(q.correct) - 1 : Number(q.correct);
                    // index(4).html은 0-기반 인덱스(0,1,2,3)로 answers를 저장하므로 느슨한 비교(==) 수행
                    const isCorrect = answers[i] == correctAns;

                    if (isCorrect) {
                        score++;
                        correctList.push(q.id);
                    } else {
                        incorrectList.push({
                            id: q.id,
                            userAnswer: answers[i],
                            correctAnswer: correctAns
                        });
                    }
                });

                // 2. 단원별(category) 및 세부단원(ch) 통계 추출 로직
                const stats = calculateCategoryStats(quizList, answers);

                const total = quizList.length;
                const resultData = {
                    studentId: studentProfile?.id || '',
                    studentName: studentProfile?.name || '',
                    score,
                    total,
                    percent: Math.round((score / total) * 100),
                    mode: filters.mode,
                    timestamp: Date.now(),
                    categoryFeedback: stats, // 영역별 피드백 호환
                    answers,
                    questions: quizList.map(q => ({ id: q.id, category: q.category, correct: q.correct })),
                    incorrectList: incorrectList // 오답 노트 복습용 추가 데이터
                };

                try {
                    // index(4).html 고유의 관리자 연동 경로로 정확하게 결과값 업로드
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').add(resultData);
                    setView('RESULT');
                } catch (e) {
                    console.error(e);
                    alert("결과 저장 중 오류가 발생했습니다.");
                }
            };
            const clearCollection = async (collectionName) => {
                if(!confirm(`${collectionName}의 모든 데이터를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
                const ref = db.collection('artifacts').doc(appId).collection('public').doc('data').collection(collectionName);
                const snapshot = await ref.get();
                const batch = db.batch();
                snapshot.docs.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                alert("삭제 완료!");
            };

            const uploadJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        const batch = db.batch();
                        const qRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('questions');
                        data.forEach((q, i) => {
                            const id = q.id || `q_${Date.now()}_${i}`;
                            batch.set(qRef.doc(id), q);
                        });
                        await batch.commit();
                        alert(`${data.length}개 문항 업로드 완료!`);
                    } catch (err) { alert("JSON 형식을 확인하세요."); }
                };
                reader.readAsText(file);
            };

            const uploadCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const rows = evt.target.result.split('\n').filter(r => r.trim());
                        const batch = db.batch();
                        const sRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
                        rows.forEach((row, i) => {
                            const [id, name, group] = row.split(',').map(s => s.trim());
                            if (id && name) batch.set(sRef.doc(id), { id, name, group: group || '기본' });
                        });
                        await batch.commit();
                        alert(`${rows.length}명의 학생 등록 완료!`);
                    } catch (err) { alert("CSV 형식을 확인하세요 (학번, 이름, 소속)."); }
                };
                reader.readAsText(file);
            };

            const toggleYear = (y) => {
                setFilters(prev => {
                    const newYears = prev.years.includes(y) 
                        ? prev.years.filter(item => item !== y) 
                        : [...prev.years, y];
                    return { ...prev, years: newYears };
                });
            };

            const toggleExamMode = async () => {
                await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('configs').doc('main').set({
                    forceExam: !examConfig.forceExam
                });
            };

            const yearOptions = useMemo(() => [...new Set(questions.map(q => String(q.year)))].sort((a,b) => b-a), [questions]);
            const sessionOptions = useMemo(() => ['전체', ...new Set(questions.map(q => String(q.session)))].sort(), [questions]);
            const categoryOptions = useMemo(() => ['전체', ...new Set(questions.map(q => q.category))].sort(), [questions]);
            const chOptions = useMemo(() => [...new Set(questions.map(q => String(q.ch)))].filter(c => c && c !== "undefined").sort((a,b) => a-b), [questions]);
            const impOptions = useMemo(() => [...new Set(questions.map(q => q.imp))].filter(i => i && i !== "undefined").sort(), [questions]);
            const subcatOptions = useMemo(() => ['전체', ...new Set(questions.map(q => q.subcat))].filter(s => s && s !== "undefined").sort(), [questions]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-sm font-bold opacity-50 tracking-widest uppercase italic">Initializing System</p>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto min-h-screen flex flex-col bg-slate-50 shadow-2xl relative border-x border-slate-200">
                    
                    <div className={`nav-drawer ${isNavOpen ? 'open' : ''} overflow-y-auto custom-scroll`}>
                        <div className="px-4 py-6 text-center">
                            <h4 className="text-[10px] font-black text-slate-300 mb-4 uppercase">NAV</h4>
                            {quizList.map((q, i) => {
                                let statusClass = answers[i] !== undefined ? 'answered' : '';
                                if (isReviewMode || (filters.mode === 'PRACTICE' && answers[i] !== undefined)) {
                                    statusClass = answers[i] === q.correct ? 'correct' : 'wrong';
                                }
                                return (
                                    <div key={i} onClick={() => { setCurrentIdx(i); setIsNavOpen(false); }} 
                                        className={`nav-item ${currentIdx === i ? 'active' : ''} ${statusClass}`}>
                                        {i + 1}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <header className="p-4 glass sticky top-0 z-[1001] flex justify-between items-center px-6">
                        <div className="cursor-pointer flex items-center gap-2" onClick={() => setView('LOGIN')}>
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-xs italic shadow-lg shadow-indigo-200">A</div>
                            <span className="text-lg font-black text-slate-800 tracking-tighter uppercase italic">Master Pro</span>
                        </div>
                        <div className="flex items-center gap-2">
                            {view === 'QUIZ' && (
                                <button onClick={() => setIsNavOpen(!isNavOpen)} className="px-3 py-1.5 bg-slate-100 rounded-xl text-[10px] font-black text-slate-600 border border-slate-200 uppercase tracking-tighter">
                                    Menu
                                </button>
                            )}
                            <button onClick={handleAdminAccess} className="p-2 text-slate-400 hover:text-indigo-600 transition-colors">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto custom-scroll flex flex-col">
                        {view === 'LOGIN' && (
                            <div className="flex flex-col items-center justify-center py-12 animate-in fade-in flex-1">
                                <div className="w-20 h-20 bg-indigo-50 rounded-[32px] flex items-center justify-center mb-8">
                                    <svg className="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                                </div>
                                <h2 className="text-3xl font-black mb-2 text-slate-800 tracking-tight">STUDENT LOGIN</h2>
                                <p className="text-slate-400 font-bold mb-10 text-sm">인증을 위해 정보를 입력하세요.</p>
                                
                                <div className="w-full space-y-3">
                                    <input id="l-id" placeholder="학번" className="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold focus:border-indigo-600 outline-none transition-all shadow-sm" />
                                    <input id="l-name" placeholder="이름" className="w-full p-5 bg-white border-2 border-slate-100 rounded-2xl font-bold focus:border-indigo-600 outline-none transition-all shadow-sm" />
<button 
                                        onClick={() => {
                                            // [필수 추가] 화면의 input 창에서 이름(l-name)과 학번(l-id) 입력값을 직접 가져옵니다.
                                            const nameInput = document.getElementById('l-name');
                                            const idInput = document.getElementById('l-id');
                                            
                                            const inputName = nameInput ? nameInput.value.trim() : '';
                                            const inputId = idInput ? idInput.value.trim() : '';

                                            if (!inputName || !inputId) {
                                                alert("이름과 학번을 모두 입력해주세요.");
                                                return;
                                            }

                                            // DB에서 실시간으로 가져온 students 배열과 촘촘하게 대조 검증
                                            const targetStudent = students.find(s => {
                                                // 학번이 s.id(문서ID) 혹은 s.studentId(내부 필드) 어느 쪽에 저장되어 있어도 다 찾을 수 있게 양방향 체크
                                                const dbId = String(s.id || s.studentId || '').trim();
                                                const dbName = String(s.name || s.studentName || '').trim();
                                                
                                                return dbId === inputId && dbName === inputName;
                                            });

                                            if (!targetStudent) {
                                                alert("등록되지 않은 학생 정보이거나, 학번과 이름이 일치하지 않습니다.\n관리자에게 명단 등록을 요청하세요.");
                                                return;
                                            }

                                            // 인증 성공 시 프로필 매핑 후 메인 대시보드로 진입
                                            setStudentProfile({
                                                id: targetStudent.id || targetStudent.studentId || inputId,
                                                name: targetStudent.name
                                            });
                                            setView('HOME');
                                        }} 
                                        className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black text-lg shadow-xl shadow-indigo-100 hover:scale-[0.98] active:scale-95 transition-all mt-4 uppercase"
                                    >
                                        Login
                                    </button>
                                </div>
                            </div>
                        )}

                        {view === 'HOME' && (
                            <div className="space-y-6 fade-in-up">
                                <div className="p-8 bg-white rounded-[40px] border border-slate-100 space-y-8 shadow-sm">
                                    <div className="flex justify-between items-end">
                                        <div>
                                            <p className="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-1">Welcome back</p>
                                            <h3 className="text-2xl font-black text-slate-800">{studentProfile?.name} 님</h3>
                                        </div>
                                        <div className="text-right">
                                            <span className="px-3 py-1 bg-indigo-50 text-indigo-600 text-[10px] font-black rounded-full uppercase">Student</span>
                                        </div>
                                    </div>

                                    <div className="space-y-6">
                                        <div className="grid grid-cols-2 gap-2 bg-slate-50 p-1.5 rounded-2xl">
                                            <button 
                                                disabled={examConfig.forceExam}
                                                onClick={() => setFilters({...filters, mode: 'PRACTICE'})} 
                                                className={`py-3 rounded-xl font-black text-xs transition-all ${filters.mode === 'PRACTICE' ? 'bg-white shadow-sm text-indigo-600' : 'text-slate-400'} ${examConfig.forceExam ? 'opacity-30 cursor-not-allowed' : ''}`}>
                                                연습 모드 {examConfig.forceExam && "🔒"}
                                            </button>
                                            <button 
                                                onClick={() => setFilters({...filters, mode: 'EXAM'})} 
                                                className={`py-3 rounded-xl font-black text-xs transition-all ${filters.mode === 'EXAM' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}`}>
                                                시험 모드
                                            </button>
                                        </div>

                                        <div className="grid grid-cols-1 gap-3">
                                            <div className="space-y-2">
                                                <label className="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-widest">연도 범위 선택</label>
                                                <div className="flex flex-wrap gap-2">
                                                    <button 
                                                        onClick={() => setFilters({...filters, years: []})}
                                                        className={`px-4 py-2.5 rounded-xl text-xs font-black transition-all border ${filters.years.length === 0 ? 'bg-indigo-600 border-indigo-600 text-white' : 'bg-white border-slate-100 text-slate-400'}`}>
                                                        전체
                                                    </button>
                                                    {yearOptions.map(y => (
                                                        <button 
                                                            key={y}
                                                            onClick={() => toggleYear(y)}
                                                            className={`px-4 py-2.5 rounded-xl text-xs font-black transition-all border ${filters.years.includes(y) ? 'bg-slate-900 border-slate-900 text-white' : 'bg-white border-slate-100 text-slate-400'}`}>
                                                            {y}년
                                                        </button>
                                                    ))}
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">챕터(CH)</label>
                                                    <select value={filters.ch} onChange={e => setFilters({...filters, ch: e.target.value})} className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold text-sm focus:ring-2 ring-indigo-500 outline-none">
                                                        <option value="전체">전체 챕터</option>
                                                        {chOptions.map(ch => <option key={ch} value={ch}>{ch}장</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">중요도(IMP)</label>
                                                    <select value={filters.imp} onChange={e => setFilters({...filters, imp: e.target.value})} className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold text-sm focus:ring-2 ring-indigo-500 outline-none">
                                                        <option value="전체">전체 등급</option>
                                                        {impOptions.map(imp => <option key={imp} value={imp}>{imp}</option>)}
                                                    </select>
                                                </div>
                                            </div>

                                            <div className="space-y-1">
                                                <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">세부 항목</label>
                                                <select value={filters.subcat} onChange={e => setFilters({...filters, subcat: e.target.value})} className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold text-sm focus:ring-2 ring-indigo-500 outline-none text-ellipsis">
                                                    {subcatOptions.map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>

                                            <div className="grid grid-cols-2 gap-3">
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">과목</label>
                                                    <select value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})} className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold text-sm focus:ring-2 ring-indigo-500 outline-none">
                                                        {categoryOptions.map(c => <option key={c} value={c}>{c}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-1">
                                                    <label className="text-[10px] font-black text-slate-400 ml-2 uppercase">문항 수</label>
                                                    <select value={filters.limit} onChange={e => setFilters({...filters, limit: e.target.value})} className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold text-sm focus:ring-2 ring-indigo-500 outline-none">
                                                        {['5', '10', '20', '30', '60', '전체'].map(l => <option key={l} value={l}>{l}문항</option>)}
                                                    </select>
                                                </div>
                                            </div>

                                            <label className="flex items-center gap-2 p-4 bg-white rounded-2xl border border-slate-100 mt-2 shadow-sm cursor-pointer">
                                                <input type="checkbox" checked={filters.onlyImg} onChange={e => setFilters({...filters, onlyImg: e.target.checked})} className="w-5 h-5 accent-indigo-600 rounded" />
                                                <span className="text-sm font-bold text-slate-700">🖼️ 그림이 있는 문제만 풀기</span>
                                            </label>
                                        </div>

                                        <button onClick={startQuiz} className="w-full py-6 bg-indigo-600 text-white rounded-[24px] font-black text-xl shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all uppercase italic">
                                            Start Test
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'QUIZ' && quizList[currentIdx] && (
                            <div className="pb-40 fade-in-up">
                                <div className="flex justify-between items-center mb-6">
                                    <div className="flex items-center gap-2">
                                        <span className="px-2 py-0.5 bg-indigo-600 text-white text-[9px] font-black rounded uppercase tracking-tighter italic">Q {currentIdx + 1}</span>
                                        <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{quizList[currentIdx].year} | {quizList[currentIdx].imp || '일반'}</span>
                                    </div>
                                    <span className="text-[11px] font-black text-slate-300 tabular-nums uppercase">{currentIdx + 1} / {quizList.length}</span>
                                </div>

                                <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm mb-4 text-xl font-bold text-slate-800 min-h-[100px] flex items-center leading-relaxed">
                                    <MathText text={quizList[currentIdx].q} />
                                </div>

                                {quizList[currentIdx].imgUrl && (
                                    <div className="mb-8 rounded-2xl overflow-hidden border border-slate-100 shadow-sm bg-white p-2">
                                        <img 
                                            src={quizList[currentIdx].imgUrl} 
                                            className="w-full h-auto object-contain max-h-[300px] mx-auto" 
                                            alt="문제 도면"
                                            onError={(e) => e.target.style.display = 'none'} 
                                        />
                                    </div>
                                )}

                                <div className="space-y-3">
                                    {[1, 2, 3, 4].map((num) => {
                                        const optKey = `options__00${num}`;
                                        const optText = quizList[currentIdx][optKey] || quizList[currentIdx].options?.[num-1];
                                        if (!optText) return null;

                                        const i = num - 1;
                                        const isSelected = answers[currentIdx] === i;
                                       const correctAns = Number(quizList[currentIdx].correct) > 3 ? Number(quizList[currentIdx].correct) - 1 : Number(quizList[currentIdx].correct);
const isCorrect = i == correctAns;
                                        const isAnswered = answers[currentIdx] !== undefined;
                                        const showFeedback = isReviewMode || (filters.mode === 'PRACTICE' && isAnswered);
                                        
                                        let btnClass = "border-white bg-white hover:border-slate-200 shadow-sm";
                                        if (showFeedback) {
                                            if (isCorrect) btnClass = "border-emerald-500 bg-emerald-50 ring-2 ring-emerald-100";
                                            else if (isSelected) btnClass = "border-rose-500 bg-rose-50 ring-2 ring-rose-100";
                                        } else if (isSelected) {
                                            btnClass = "border-indigo-600 bg-indigo-50 ring-2 ring-indigo-100";
                                        }

                                        return (
                                            <button 
                                                key={i} 
                                                disabled={showFeedback && !isReviewMode}
                                                onClick={() => setAnswers(prev => ({...prev, [currentIdx]: i}))} 
                                                className={`w-full p-5 text-left border-2 rounded-2xl flex gap-4 transition-all duration-200 group active:scale-[0.98] ${btnClass}`}>
                                                <span className={`w-8 h-8 rounded-xl flex items-center justify-center shrink-0 text-xs font-black transition-colors ${isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400 group-hover:bg-slate-200'}`}>{num}</span>
                                                <div className="text-[16px] font-bold flex-1"><MathText text={optText} /></div>
                                            </button>
                                        );
                                    })}
                                </div>

                                {(isReviewMode || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined)) && (
                                    <div className="mt-8 p-6 bg-slate-900 text-white rounded-[32px] shadow-xl fade-in-up">
                                        <p className="text-[10px] font-black uppercase text-indigo-400 mb-4 tracking-widest flex items-center gap-2">
                                            <div className="w-1.5 h-1.5 bg-indigo-500 rounded-full animate-pulse"></div>
                                            Master Commentary
                                        </p>
                                        
                                        {quizList[currentIdx].eurl && (
                                            <div className="mb-6 rounded-2xl overflow-hidden bg-white p-2">
                                                <img 
                                                    src={quizList[currentIdx].eurl} 
                                                    className="w-full h-auto object-contain max-h-[280px] mx-auto" 
                                                    alt="해설 그림"
                                                    onError={(e) => e.target.style.display = 'none'} 
                                                />
                                            </div>
                                        )}

                                        <div className="text-sm font-medium leading-relaxed opacity-90 border-t border-white pt-4">
                                            <div className="mb-2 text-indigo-300 text-[11px] font-black">[{quizList[currentIdx].subcat}]</div>
                                            <MathText text={quizList[currentIdx].exp || "이 문항에 대한 해설이 등록되지 않았습니다."} />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

{view === 'RESULT' && (
                            <div className="py-8 space-y-8 fade-in-up">
                                <div className="text-center space-y-2">
                                    <h2 className="text-4xl font-black text-slate-800 tracking-tighter uppercase italic">TEST COMPLETED</h2>
                                    <p className="text-slate-400 font-bold uppercase text-[10px] tracking-widest">수고하셨습니다. 결과를 확인하세요.</p>
                                </div>

                                {(() => {
                                    const score = quizList.reduce((acc, q, i) => {
                                        const correctAns = Number(q.correct) > 3 ? Number(q.correct) - 1 : Number(q.correct);
                                        return acc + (answers[i] == correctAns ? 1 : 0);
                                    }, 0);
                                    const total = quizList.length;
                                    const percent = Math.round((score / total) * 100);
                                    const isPass = percent >= 60;
                                    const stats = calculateCategoryStats(quizList, answers);

                                    return (
                                        <div className="space-y-6">
                                            <div className="p-8 bg-white rounded-[40px] border border-slate-100 shadow-sm text-center">
                                                <div className={`inline-flex px-4 py-1.5 rounded-full text-[10px] font-black uppercase mb-4 ${isPass ? 'bg-emerald-100 text-emerald-700' : 'bg-rose-100 text-rose-700'}`}>
                                                    {isPass ? 'Pass' : 'Failed'}
                                                </div>
                                                <div className="text-7xl font-black text-slate-900 mb-2 tabular-nums">{percent}<span className="text-3xl text-slate-300">%</span></div>
                                                <p className="text-sm font-bold text-slate-400">{total}문항 중 {score}문항 정답</p>
                                            </div>

                                            {/* 영역별/단원별 피드백 UI 연동 구조 강화 */}
                                            <div className="grid grid-cols-1 gap-3">
                                                <p className="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-widest">영역별 피드백 및 분석 결과</p>
                                                {stats.map(s => (
                                                    <div key={s.name} className="p-5 bg-white rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm">
                                                        <div className="flex-1 pr-4">
                                                            <p className="text-[11px] font-black text-indigo-600 uppercase mb-1.5">{s.name}</p>
                                                            <div className="flex items-center gap-3">
                                                                <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                                    <div className="h-full bg-indigo-500 rounded-full transition-all" style={{ width: `${s.percent}%` }}></div>
                                                                </div>
                                                                <span className="text-[10px] font-bold text-slate-400 tabular-nums">{s.correct} / {s.total}</span>
                                                            </div>
                                                        </div>
                                                        <p className="text-xl font-black text-slate-800 tabular-nums">{s.percent}%</p>
                                                    </div>
                                                ))}
                                            </div>

                                            <div className="grid grid-cols-2 gap-3 pt-4">
                                                <button onClick={() => { setIsReviewMode(true); setView('QUIZ'); setCurrentIdx(0); }} className="p-5 bg-slate-900 text-white rounded-2xl font-black text-sm shadow-xl shadow-slate-200 hover:scale-[0.99] transition-all">오답 복습하기</button>
                                                <button onClick={() => setView('HOME')} className="p-5 bg-white border-2 border-slate-100 rounded-2xl font-black text-sm hover:bg-slate-50 transition-all">메인으로</button>
                                            </div>
                                        </div>
                                    );
                                })()}
                            </div>
                        )}

                        {view === 'ADMIN' && (
                            <div className="space-y-8 pb-12 fade-in-up">
                                <div className="flex justify-between items-end">
                                    <h2 className="text-3xl font-black text-slate-800 uppercase italic tracking-tighter">Admin Panel</h2>
                                    <button onClick={() => setView('LOGIN')} className="px-4 py-2 bg-rose-50 text-rose-600 rounded-xl font-black text-[10px] uppercase">Logout</button>
                                </div>
{/* 학생별 결과 엑셀 추출 버튼 (위치 A) */}
        <div className="flex justify-end">
            <button 
                onClick={() => {
                    if (!results || results.length === 0) {
                        alert("추출할 학생 결과 데이터가 없습니다.");
                        return;
                    }
                    const headers = ["학번", "이름", "점수", "총점", "정답률", "모드", "영역별피드백", "일시"];
                    const csvRows = results.map(r => {
                        const feedbackStr = r.categoryFeedback?.map(f => `${f.name}:${f.percent}%`).join(" | ") || "";
                        return [
                            r.studentId || '', 
                            r.studentName || '', 
                            r.score ?? 0, 
                            r.total ?? 0, 
                            (r.percent || Math.round((r.score / (r.total || 1)) * 100)) + "%", 
                            r.mode || "EXAM", 
                            `"${feedbackStr}"`, 
                            r.timestamp ? new Date(r.timestamp).toLocaleString() : ''
                        ].join(",");
                    });
                    const csv = [headers.join(","), ...csvRows].join("\n");
                    const blob = new Blob(["\uFEFF" + csv], { type: 'text/csv;charset=utf-8;' });
                    const link = document.createElement("a");
                    link.href = URL.createObjectURL(blob);
                    link.download = `학생별_시험_결과_${new Date().toISOString().slice(0,10)}.csv`;
                    link.click();
                }}
                className="w-full sm:w-auto px-4 py-3 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-black text-xs flex items-center justify-center gap-2 shadow-lg shadow-emerald-100 transition-all active:scale-95"
            >
                <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
                </svg>
                학생 결과 엑셀(CSV) 추출
            </button>
        </div>
                                <div className="grid grid-cols-3 gap-3">
                                    <div className="p-4 bg-white rounded-2xl border border-slate-100">
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Items</p>
                                        <p className="text-xl font-black text-indigo-600">{questions.length}</p>
                                    </div>
                                    <div className="p-4 bg-white rounded-2xl border border-slate-100">
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Students</p>
                                        <p className="text-xl font-black text-slate-800">{students.length}</p>
                                    </div>
                                    <div className="p-4 bg-white rounded-2xl border border-slate-100">
                                        <p className="text-[9px] font-black text-slate-400 uppercase mb-1">Results</p>
                                        <p className="text-xl font-black text-slate-800">{results.length}</p>
                                    </div>
                                </div>

                                <div className="space-y-6">
                                    <div className={`p-6 rounded-3xl border transition-all ${examConfig.forceExam ? 'bg-slate-900 border-slate-900 text-white' : 'bg-white border-slate-100 text-slate-800'}`}>
                                        <div className="flex justify-between items-center">
                                            <div>
                                                <p className="text-[10px] font-black uppercase opacity-50 mb-1">System Control</p>
                                                <h4 className="text-lg font-black italic">시험 모드 강제 제어</h4>
                                            </div>
                                            <button onClick={toggleExamMode} className={`w-14 h-8 rounded-full relative transition-colors ${examConfig.forceExam ? 'bg-indigo-500' : 'bg-slate-200'}`}>
                                                <div className={`absolute top-1 w-6 h-6 bg-white rounded-full transition-all ${examConfig.forceExam ? 'left-7' : 'left-1 shadow-sm'}`}></div>
                                            </button>
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <p className="text-[10px] font-black text-slate-400 ml-2 uppercase tracking-widest">데이터 업로드 & 관리</p>
                                        <div className="grid grid-cols-1 gap-2">                                
                                            <div className="flex gap-2">
                                                <label className="flex-1 p-4 bg-white border-2 border-slate-100 rounded-2xl font-black text-xs cursor-pointer hover:bg-slate-50 transition-all flex items-center justify-center gap-2 text-center">
                                                    CSV -&gt; JSON 변환 후 업로드 (JSON 전용)
                                                    <input type="file" className="hidden" accept=".json" onChange={uploadJSON} />
                                                </label>
                                                <button onClick={() => clearCollection('questions')} className="px-4 bg-rose-50 text-rose-600 rounded-2xl border border-rose-100 font-black text-[10px] uppercase">초기화</button>
                                            </div>
                                            <div className="flex gap-2">
                                                <label className="flex-1 p-4 bg-white border-2 border-slate-100 rounded-2xl font-black text-xs cursor-pointer hover:bg-slate-50 transition-all flex items-center justify-center gap-2">
                                                    학생 업로드 (CSV)
                                                    <input type="file" className="hidden" accept=".csv" onChange={uploadCSV} />
                                                </label>
                                                <button onClick={() => clearCollection('students')} className="px-4 bg-rose-50 text-rose-600 rounded-2xl border border-rose-100 font-black text-[10px] uppercase">초기화</button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                                    <p className="text-[10px] font-black text-indigo-600 uppercase mb-2">필독 가이드</p>
                                    <p className="text-xs font-bold text-slate-600 leading-relaxed">
                                        기존 CSV 데이터를 JSON으로 변환하여 업로드해야 합니다. `subcat`, `ch`, `imp` 필드가 자동으로 매핑되어 홈 화면의 필터에 노출됩니다.
                                    </p>
                                </div>
                            </div>
                        )}
                    </main>

                    {view === 'QUIZ' && (
                        <footer className="fixed bottom-0 left-0 right-0 max-w-xl mx-auto p-6 glass flex gap-4 z-[1001]">
                            <button disabled={currentIdx === 0} onClick={() => setCurrentIdx(p => p - 1)} className="w-16 h-16 bg-slate-100 text-slate-400 rounded-3xl flex items-center justify-center hover:bg-slate-200 transition-all disabled:opacity-30 active:scale-90">
                                <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <button onClick={() => {
                                if (currentIdx < quizList.length - 1) setCurrentIdx(p => p + 1);
                                else {
                                    if (isReviewMode) setView('RESULT');
                                    else if (confirm("모든 문항을 풀었습니다. 제출하시겠습니까?")) submitExam();
                                }
                            }} className="flex-1 bg-slate-900 text-white rounded-3xl font-black text-lg shadow-xl shadow-slate-200 hover:bg-black active:scale-95 transition-all">
                                {currentIdx === quizList.length - 1 ? (isReviewMode ? '복습 종료' : '제출하기') : '다음 문항'}
                            </button>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
