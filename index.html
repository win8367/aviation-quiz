<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>항공마스터 Pro - 통합 관리 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <!-- React & Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Firebase SDK (Compat Version) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;900&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .nav-drawer {
            position: fixed; left: 0; top: 0; bottom: 0; width: 70px;
            background: white; box-shadow: 4px 0 15px rgba(0,0,0,0.05);
            transform: translateX(-100%); transition: transform 0.3s ease; z-index: 1000; padding-top: 80px;
        }
        .nav-drawer.open { transform: translateX(0); }
        .nav-item {
            width: 40px; height: 40px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 12px; font-weight: 800; margin: 0 auto 10px auto;
            border: 2px solid #f1f5f9; cursor: pointer; transition: all 0.2s;
        }
        .nav-item.active { border-color: #4f46e5; background: #4f46e5; color: white; }
        .nav-item.answered { background: #f1f5f9; color: #64748b; }
        .nav-item.correct { background: #10b981; color: white; border-color: transparent; }
        .nav-item.wrong { background: #ef4444; color: white; border-color: transparent; }
        
        /* 애니메이션 효과 */
        .fade-in-up {
            animation: fadeInUp 0.4s ease-out forwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyCoSlnAX9Hqh85IBtJuGqLrJdpxRbFgwnc",
            authDomain: "airtest-422fe.firebaseapp.com",
            projectId: "airtest-422fe",
            storageBucket: "airtest-422fe.firebasestorage.app",
            messagingSenderId: "203408450908",
            appId: "1:203408450908:web:1be58ef1b4b4f4b3f5cd99",
            measurementId: "G-PC36TY5R3M"
        };
        
        const appId = 'aviation-master-pro';
        const app = !firebase.apps.length ? firebase.initializeApp(firebaseConfig) : firebase.app();
        const auth = firebase.auth();
        const db = firebase.firestore();

        const MathText = ({ text }) => {
            const containerRef = useRef(null);
            useEffect(() => {
                if (containerRef.current) {
                    renderMathInElement(containerRef.current, {
                        delimiters: [
                            { left: "$$", right: "$$", display: true },
                            { left: "$", right: "$", display: false },
                            { left: "\\(", right: "\\)", display: false },
                            { left: "\\[", right: "\\]", display: true }
                        ],
                        throwOnError: false
                    });
                }
            }, [text]);
            return <div ref={containerRef} className="whitespace-pre-wrap leading-relaxed">{text || ""}</div>;
        };

        const App = () => {
            const [view, setView] = useState('LOGIN');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [studentProfile, setStudentProfile] = useState(null);
            
            const [questions, setQuestions] = useState([]);
            const [students, setStudents] = useState([]);
            const [results, setResults] = useState([]);
            const [examConfig, setExamConfig] = useState({ active: false });
            
            const [quizList, setQuizList] = useState([]);
            const [currentIdx, setCurrentIdx] = useState(0);
            const [answers, setAnswers] = useState({});
            const [isReviewMode, setIsReviewMode] = useState(false);
            const [isNavOpen, setIsNavOpen] = useState(false);
            
            const [filters, setFilters] = useState({ 
                year: '전체', session: '전체', category: '전체', limit: '10', mode: 'PRACTICE' 
            });

            useEffect(() => {
                if (examConfig.active) {
                    setFilters(f => ({...f, mode: 'EXAM'}));
                }
            }, [examConfig.active]);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (u) => {
                    if (u) {
                        setUser(u);
                        setLoading(false);
                    } else {
                        await auth.signInAnonymously();
                    }
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const publicPath = db.collection('artifacts').doc(appId).collection('public').doc('data');
                
                const unsubQ = publicPath.collection('questions').onSnapshot(s => setQuestions(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubS = publicPath.collection('students').onSnapshot(s => setStudents(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubR = publicPath.collection('results').onSnapshot(s => setResults(s.docs.map(d => ({id: d.id, ...d.data()}))));
                const unsubC = publicPath.collection('configs').doc('main').onSnapshot(doc => { 
                    if(doc.exists) setExamConfig(doc.data().exam || { active: false }); 
                });

                return () => { unsubQ(); unsubS(); unsubR(); unsubC(); };
            }, [user]);

            const handleLogin = (name, sid) => {
                if (!name || !sid) return alert("성함과 학번을 입력해주세요.");
                const found = students.find(s => s.name === name && String(s.studentId) === String(sid));
                if (students.length > 0 && !found) return alert("등록되지 않은 학생 정보입니다.");
                setStudentProfile({ name, studentId: sid });
                setView('HOME');
            };

            const startQuiz = () => {
                let pool = questions.filter(q => 
                    (filters.year === '전체' || String(q.year) === filters.year) &&
                    (filters.session === '전체' || q.session === filters.session) &&
                    (filters.category === '전체' || q.category === filters.category)
                );
                if (pool.length === 0) return alert("해당 조건의 문제가 없습니다.");
                pool = [...pool].sort(() => Math.random() - 0.5);
                if (filters.limit !== '전체') pool = pool.slice(0, parseInt(filters.limit));
                setQuizList(pool);
                setAnswers({});
                setCurrentIdx(0);
                setIsReviewMode(false);
                setView('QUIZ');
            };

            const submitQuiz = async () => {
                if (isReviewMode) return setView('HOME');
                const correctCount = quizList.filter((q, idx) => answers[idx] === q.correct).length;
                const finalScore = Math.round((correctCount / quizList.length) * 100);
                try {
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('results').add({
                        name: studentProfile.name,
                        studentId: studentProfile.studentId,
                        score: finalScore,
                        correct: correctCount,
                        total: quizList.length,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        mode: filters.mode,
                        uid: user.uid,
                        userAnswers: answers,
                        questionSet: quizList.map(q => q.id)
                    });
                    setView('RESULT');
                } catch (e) { alert("저장 실패"); }
            };

            const toggleExam = async () => {
                try {
                    const newStatus = !examConfig.active;
                    await db.collection('artifacts').doc(appId).collection('public').doc('data').collection('configs').doc('main').set({
                        exam: { active: newStatus }
                    }, { merge: true });
                } catch (e) { alert("상태 변경 실패"); }
            };

            const uploadJSON = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const data = JSON.parse(evt.target.result);
                        const batch = db.batch();
                        const qRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('questions');
                        data.forEach((q, i) => {
                            const id = q.id || `q_${Date.now()}_${i}`;
                            batch.set(qRef.doc(id), q);
                        });
                        await batch.commit();
                        alert(`${data.length}개 문항 업로드 완료!`);
                    } catch (err) { alert("JSON 형식을 확인하세요."); }
                };
                reader.readAsText(file);
            };

            const uploadStudentsCSV = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (evt) => {
                    try {
                        const lines = evt.target.result.split('\n');
                        const batch = db.batch();
                        const sRef = db.collection('artifacts').doc(appId).collection('public').doc('data').collection('students');
                        let count = 0;
                        lines.forEach((line) => {
                            const [name, sid] = line.split(',').map(s => s.trim());
                            if (name && sid) {
                                batch.set(sRef.doc(sid), { name, studentId: sid });
                                count++;
                            }
                        });
                        await batch.commit();
                        alert(`${count}명의 학생 등록 완료!`);
                    } catch (err) { alert("CSV 형식을 확인하세요 (성함,학번)."); }
                };
                reader.readAsText(file);
            };

            const categoryAnalysis = useMemo(() => {
                const stats = {};
                quizList.forEach((q, i) => {
                    const cat = q.category || '기타';
                    if (!stats[cat]) stats[cat] = { total: 0, correct: 0 };
                    stats[cat].total++;
                    if (answers[i] === q.correct) stats[cat].correct++;
                });
                return stats;
            }, [quizList, answers, view]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-900 text-white">
                    <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <p className="text-sm font-bold opacity-50">시스템 초기화 중...</p>
                </div>
            );

            return (
                <div className="max-w-xl mx-auto min-h-screen flex flex-col bg-slate-50 shadow-2xl relative">
                    
                    {/* Navigation Drawer */}
                    <div className={`nav-drawer ${isNavOpen ? 'open' : ''} overflow-y-auto custom-scroll`}>
                        <div className="px-4 py-6">
                            <h4 className="text-[10px] font-black text-slate-300 mb-4 text-center uppercase tracking-tighter">문항 이동</h4>
                            {quizList.map((q, i) => {
                                let statusClass = answers[i] !== undefined ? 'answered' : '';
                                if (isReviewMode || (filters.mode === 'PRACTICE' && answers[i] !== undefined)) {
                                    statusClass = answers[i] === q.correct ? 'correct' : 'wrong';
                                }
                                return (
                                    <div key={i} onClick={() => { setCurrentIdx(i); setIsNavOpen(false); }} 
                                        className={`nav-item ${currentIdx === i ? 'active' : ''} ${statusClass}`}>
                                        {i + 1}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <header className="p-4 glass sticky top-0 z-[1001] flex justify-between items-center px-6">
                        <div className="cursor-pointer flex items-center gap-2" onClick={() => setView('HOME')}>
                            <div className="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-black text-xs italic">A</div>
                            <span className="text-lg font-black text-slate-800 tracking-tighter uppercase italic">Master Pro</span>
                        </div>
                        <div className="flex gap-2">
                            {view === 'QUIZ' && (
                                <button onClick={() => setIsNavOpen(!isNavOpen)} className="px-3 py-1.5 bg-slate-100 rounded-xl text-[10px] font-black text-slate-600 border border-slate-200">
                                    {isNavOpen ? '닫기' : '문항'}
                                </button>
                            )}
                            <button onClick={() => setView('ADMIN')} className="p-2 text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-xl transition-all">
                                <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path></svg>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-6 overflow-y-auto custom-scroll">
                        {view === 'LOGIN' && (
                            <div className="flex flex-col items-center justify-center py-12 animate-in fade-in zoom-in-95">
                                <div className="text-center mb-10">
                                    <h2 className="text-4xl font-black text-slate-900 tracking-tighter">학생 인증</h2>
                                    <p className="text-slate-400 text-sm mt-2 font-medium">항공마스터 시스템에 오신 것을 환영합니다</p>
                                </div>
                                <div className="w-full space-y-4 mb-8">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Name</label>
                                        <input id="l-name" type="text" placeholder="성함을 입력하세요" className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-black text-slate-400 ml-1 uppercase">Student ID</label>
                                        <input id="l-id" type="text" placeholder="학번을 입력하세요" className="w-full p-4 bg-white border-2 border-slate-100 rounded-2xl font-bold outline-none focus:border-indigo-500 transition-all" />
                                    </div>
                                </div>
                                <button onClick={() => handleLogin(document.getElementById('l-name').value, document.getElementById('l-id').value)} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all">접속하기</button>
                            </div>
                        )}

                        {view === 'HOME' && (
                            <div className="space-y-6 animate-in slide-in-from-bottom-6">
                                <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm space-y-8">
                                    <div className="flex justify-between items-center">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Setup Quiz Session</h3>
                                        {examConfig.active && <span className="bg-rose-100 text-rose-600 px-3 py-1 rounded-full text-[10px] font-black animate-pulse">시험 진행중</span>}
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 bg-slate-50 p-1.5 rounded-2xl">
                                        <button 
                                            disabled={examConfig.active}
                                            onClick={() => setFilters({...filters, mode: 'PRACTICE'})} 
                                            className={`py-4 rounded-xl font-black text-xs transition-all ${filters.mode === 'PRACTICE' ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-400'}`}>
                                            연습 모드
                                        </button>
                                        <button onClick={() => setFilters({...filters, mode: 'EXAM'})} className={`py-4 rounded-xl font-black text-xs transition-all ${filters.mode === 'EXAM' ? 'bg-slate-900 text-white shadow-lg' : 'text-slate-400'}`}>시험 모드</button>
                                    </div>
                                    
                                    <div className="grid grid-cols-1 gap-4">
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 ml-1">연도 선택</label>
                                                <select value={filters.year} onChange={e => setFilters({...filters, year: e.target.value})} className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold text-sm outline-none">
                                                    <option value="전체">전체 연도</option>
                                                    {[...new Set(questions.map(q => String(q.year)))].sort().reverse().map(y => <option key={y} value={y}>{y}년</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 ml-1">회차 선택</label>
                                                <select value={filters.session} onChange={e => setFilters({...filters, session: e.target.value})} className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold text-sm outline-none">
                                                    <option value="전체">전체 회차</option>
                                                    {[...new Set(questions.map(q => q.session))].sort().map(s => <option key={s} value={s}>{s}</option>)}
                                                </select>
                                            </div>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-400 ml-1">과목 선택</label>
                                            <select value={filters.category} onChange={e => setFilters({...filters, category: e.target.value})} className="w-full p-4 bg-slate-50 border-0 rounded-2xl font-bold text-sm outline-none">
                                                <option value="전체">전체 과목</option>
                                                {[...new Set(questions.map(q => q.category))].sort().map(c => <option key={c} value={c}>{c}</option>)}
                                            </select>
                                        </div>
                                        <div className="space-y-1.5">
                                            <label className="text-[10px] font-black text-slate-400 ml-1">문제 수</label>
                                            <div className="grid grid-cols-3 gap-2">
                                                {['5', '10', '20', '30', '60', '전체'].map(num => (
                                                    <button key={num} onClick={() => setFilters({...filters, limit: num})} className={`py-3 rounded-xl font-bold text-xs border-2 transition-all ${filters.limit === num ? 'border-indigo-600 bg-indigo-50 text-indigo-600' : 'border-slate-100 text-slate-400'}`}>
                                                        {num}개
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                        <button onClick={startQuiz} className="w-full py-5 bg-indigo-600 text-white rounded-3xl font-black text-lg shadow-xl shadow-indigo-100 hover:bg-indigo-700 transition-all active:scale-[0.98]">테스트 시작하기</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'QUIZ' && quizList[currentIdx] && (
                            <div className="pb-40 animate-in fade-in">
                                <div className="flex justify-between items-center mb-6 px-2">
                                    <div className="flex flex-col">
                                        <span className="text-[10px] font-black text-indigo-600 uppercase tracking-widest">{quizList[currentIdx].category}</span>
                                        <span className="text-[10px] font-bold text-slate-300">{quizList[currentIdx].year}년 {quizList[currentIdx].session}</span>
                                    </div>
                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">Question {currentIdx + 1} / {quizList.length}</span>
                                </div>
                                <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm mb-8 font-bold text-slate-800 text-xl leading-relaxed min-h-[160px]">
                                    <MathText text={quizList[currentIdx].q} />
                                </div>
                                <div className="space-y-3">
                                    {quizList[currentIdx].options.map((opt, i) => {
                                        const isSelected = answers[currentIdx] === i;
                                        const isCorrect = i === quizList[currentIdx].correct;
                                        const isAnswered = answers[currentIdx] !== undefined;
                                        const showFeedback = isReviewMode || (filters.mode === 'PRACTICE' && isAnswered);
                                        
                                        let btnClass = "border-white bg-white hover:border-slate-100";
                                        if (showFeedback) {
                                            if (isCorrect) btnClass = "border-emerald-500 bg-emerald-50 shadow-sm";
                                            else if (isSelected) btnClass = "border-rose-500 bg-rose-50";
                                        } else if (isSelected) {
                                            btnClass = "border-indigo-600 bg-indigo-50 shadow-md";
                                        }

                                        return (
                                            <button 
                                                key={i} 
                                                disabled={showFeedback && !isReviewMode}
                                                onClick={() => setAnswers(prev => ({...prev, [currentIdx]: i}))} 
                                                className={`w-full p-5 text-left border-2 rounded-2xl flex gap-4 transition-all ${btnClass}`}>
                                                <span className={`w-7 h-7 rounded-lg flex items-center justify-center shrink-0 text-xs font-black ${isSelected ? 'bg-indigo-600 text-white' : 'bg-slate-100 text-slate-400'}`}>{i+1}</span>
                                                <div className="text-[16px] font-bold flex-1 pt-0.5"><MathText text={opt} /></div>
                                            </button>
                                        );
                                    })}
                                </div>

                                {/* 해설 섹션: 연습 모드에서 선택했거나 복습 모드일 때만 표시 */}
                                {(isReviewMode || (filters.mode === 'PRACTICE' && answers[currentIdx] !== undefined)) && (
                                    <div className="mt-8 p-6 bg-slate-900 text-white rounded-[24px] fade-in-up">
                                        <div className="flex items-center gap-2 mb-3 text-indigo-400">
                                            <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 20 20">
                                                <path fillRule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clipRule="evenodd" />
                                            </svg>
                                            <span className="text-[10px] font-black uppercase tracking-widest">Commentary (해설)</span>
                                        </div>
                                        <div className="text-sm font-medium leading-relaxed opacity-90 border-t border-white/10 pt-3">
                                            <MathText text={quizList[currentIdx].commentary || "이 문제에 대한 추가 해설 데이터가 없습니다."} />
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'RESULT' && (
                            <div className="animate-in zoom-in-95 pb-12">
                                <div className="text-center py-8">
                                    <div className="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"></path></svg>
                                    </div>
                                    <h2 className="text-3xl font-black mb-1">테스트 완료!</h2>
                                    <p className="text-slate-400 font-medium">분석 결과가 생성되었습니다.</p>
                                </div>
                                <div className="space-y-4">
                                    <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm flex justify-between items-center">
                                        <div className="text-left">
                                            <p className="text-[10px] font-black text-slate-300 uppercase">Total Score</p>
                                            <p className="text-5xl font-black text-indigo-600">{quizList.length > 0 ? Math.round((quizList.filter((q, i) => answers[i] === q.correct).length / quizList.length) * 100) : 0}<span className="text-lg text-slate-300 ml-1">pts</span></p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] font-black text-slate-300 uppercase">Correct Ratio</p>
                                            <p className="text-2xl font-black text-slate-800">{quizList.filter((q, i) => answers[i] === q.correct).length} <span className="text-slate-300">/ {quizList.length}</span></p>
                                        </div>
                                    </div>
                                    <div className="bg-white p-8 rounded-[32px] border border-slate-100 shadow-sm space-y-6">
                                        <h3 className="text-xs font-black text-slate-400 uppercase tracking-widest">Category Analysis</h3>
                                        <div className="space-y-4">
                                            {Object.entries(categoryAnalysis).map(([cat, data]) => {
                                                const ratio = Math.round((data.correct / data.total) * 100);
                                                return (
                                                    <div key={cat} className="space-y-2">
                                                        <div className="flex justify-between text-xs font-bold">
                                                            <span>{cat}</span>
                                                            <span className={ratio >= 70 ? 'text-emerald-500' : 'text-rose-500'}>{ratio}%</span>
                                                        </div>
                                                        <div className="h-2 bg-slate-50 rounded-full overflow-hidden">
                                                            <div className={`h-full rounded-full transition-all duration-1000 ${ratio >= 70 ? 'bg-emerald-500' : 'bg-rose-500'}`} style={{width: `${ratio}%`}}></div>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <button onClick={() => { setIsReviewMode(true); setCurrentIdx(0); setView('QUIZ'); }} className="py-5 bg-slate-900 text-white rounded-3xl font-black shadow-xl hover:bg-slate-800 transition-all">오답 복습</button>
                                        <button onClick={() => setView('HOME')} className="py-5 bg-white border-2 border-slate-100 text-slate-400 rounded-3xl font-black hover:border-slate-200 transition-all">종료하기</button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {view === 'ADMIN' && (
                            <div className="space-y-8 animate-in fade-in pb-24">
                                <div className="flex justify-between items-center">
                                    <h2 className="text-2xl font-black tracking-tighter">관리자 대시보드</h2>
                                    <button onClick={() => setView('LOGIN')} className="px-4 py-2 bg-rose-50 text-rose-600 rounded-xl text-xs font-black">나가기 (로그아웃)</button>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">Questions</p>
                                        <p className="text-3xl font-black text-indigo-600">{questions.length}</p>
                                    </div>
                                    <div className="p-6 bg-white rounded-3xl border border-slate-100 shadow-sm">
                                        <p className="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">Students</p>
                                        <p className="text-3xl font-black text-slate-800">{students.length}</p>
                                    </div>
                                </div>
                                <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm space-y-6">
                                    <h3 className="font-black text-xl flex items-center gap-2">
                                        <span className="w-2 h-6 bg-indigo-600 rounded-full"></span>
                                        환경 설정
                                    </h3>
                                    <div className="flex flex-col gap-3">
                                        <button onClick={toggleExam} className={`p-5 rounded-2xl font-black text-sm transition-all ${examConfig.active ? 'bg-rose-500 text-white' : 'bg-slate-100 text-slate-600'}`}>
                                            시험 모드 상태: {examConfig.active ? '활성화 중' : '비활성화'}
                                        </button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-3">
                                        <label className="p-4 bg-slate-900 text-white rounded-2xl font-black text-xs text-center cursor-pointer hover:bg-slate-800 transition-all">
                                            문제 JSON 업로드
                                            <input type="file" className="hidden" accept=".json" onChange={uploadJSON} />
                                        </label>
                                        <label className="p-4 bg-indigo-600 text-white rounded-2xl font-black text-xs text-center cursor-pointer hover:bg-indigo-700 transition-all">
                                            학생 CSV 업로드
                                            <input type="file" className="hidden" accept=".csv" onChange={uploadStudentsCSV} />
                                        </label>
                                    </div>
                                </div>
                                <div className="p-8 bg-white rounded-[32px] border border-slate-100 shadow-sm space-y-6">
                                    <h3 className="font-black text-xl flex items-center gap-2">
                                        <span className="w-2 h-6 bg-emerald-500 rounded-full"></span>
                                        실시간 결과 (최근 10건)
                                    </h3>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-xs font-bold">
                                            <thead>
                                                <tr className="border-b border-slate-50 text-slate-300">
                                                    <th className="py-2 text-[10px] uppercase tracking-wider">이름</th>
                                                    <th className="py-2 text-[10px] uppercase tracking-wider">점수</th>
                                                    <th className="py-2 text-[10px] uppercase tracking-wider">모드</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {results.slice().sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)).slice(0, 10).map((r, i) => (
                                                    <tr key={i} className="border-b border-slate-50">
                                                        <td className="py-3">{r.name}</td>
                                                        <td className="py-3 text-indigo-600 font-black">{r.score}</td>
                                                        <td className="py-3 opacity-50">{r.mode}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {view === 'QUIZ' && (
                        <footer className="fixed bottom-0 left-0 right-0 max-w-xl mx-auto p-6 glass flex gap-4 z-[1001]">
                            <button disabled={currentIdx === 0} onClick={() => setCurrentIdx(p => p - 1)} className={`w-16 h-16 rounded-3xl flex items-center justify-center transition-all ${currentIdx === 0 ? 'bg-slate-50 text-slate-200' : 'bg-slate-100 text-slate-400 hover:bg-slate-200'}`}>
                                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <button 
                                onClick={() => {
                                    if (currentIdx < quizList.length - 1) setCurrentIdx(p => p + 1);
                                    else if(confirm(isReviewMode ? "복습을 마치시겠습니까?" : "모든 정답을 제출하시겠습니까?")) submitQuiz();
                                }} 
                                className="flex-1 bg-slate-900 text-white rounded-3xl font-black text-lg shadow-2xl active:scale-[0.98] transition-all hover:bg-slate-800"
                            >
                                {currentIdx === quizList.length - 1 ? (isReviewMode ? '복습 종료' : '최종 제출하기') : '다음 문항'}
                            </button>
                        </footer>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
